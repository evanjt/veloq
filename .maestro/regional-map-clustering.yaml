# Regional Map — Activity Clustering (US-R4)
# Verifies native MapLibre clustering on the activity layer: point_count
# labels appear on cluster circles; tap expands them. Uses the 3-tier
# circleRadius step (20/25/30 for <10 / 10–49 / 50+).
#
# Demo data has 82 activities across Switzerland, Brazil, Spain, South Africa.
# At world-fit zoom the clustering should visibly collapse them.

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-map.yaml

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 30000

# Use the fit-all button to force a zoom that shows every activity,
# guaranteeing clusters collapse.
- tapOn:
    id: "map-fit-all"
- waitForAnimationToEnd:
    timeout: 2500

- takeScreenshot: "clustering-fit-all"

# Pinch out further for a clearer clustered view.
- swipe:
    start: 30%, 50%
    end: 70%, 50%
    duration: 500
- waitForAnimationToEnd:
    timeout: 1500

- takeScreenshot: "clustering-zoomed-out"

# Cluster count labels are rendered as text via SymbolLayer with
# textField: point_count_abbreviated. With 82 activities, we expect at
# least one count label visible on screen (e.g., "82", "50", or similar).
# The text is abbreviated (k for thousands), so match 1–3 digits optionally
# followed by 'k'.
- assertVisible:
    text: "^\\d{1,3}k?$"

- assertNotVisible:
    text: "NaN"
