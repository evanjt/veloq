# Recording Review Screen Test
# Tests the review screen: verify fields, enter activity name, save

appId: com.veloq.app.dev
tags:
  - tier5 # Disabled: record-fab removed from UI
onFlowComplete:
  - openLink: "veloq://home"
  - runFlow:
      when:
        visible: "DISCARD"
      commands:
        - tapOn: "DISCARD"
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Start a recording
- tapOn:
    id: "record-fab"

# Dismiss any "Resume previous recording?" dialog
- runFlow:
    when:
      visible: "DISCARD"
    commands:
      - tapOn: "DISCARD"

- tapOn:
    id: "record-type-Ride"

# Wait for recording screen
- extendedWaitUntil:
    visible:
      id: "recording-timer"
    timeout: 10000

# Unlock the lock overlay (auto-engaged on recording start)
- swipe:
    from:
      id: "lock-overlay-unlock"
    direction: RIGHT
    duration: 800

# Wait for controls to appear after unlock
- extendedWaitUntil:
    visible:
      id: "control-pause"
    timeout: 5000

# Pause the recording first
- tapOn:
    id: "control-pause"

# Wait for paused state (resume + stop buttons)
- extendedWaitUntil:
    visible:
      id: "control-resume"
    timeout: 5000

# Long-press stop to end recording (paused-state stop requires hold)
- longPressOn:
    id: "control-stop"

# Wait for review screen to load
- extendedWaitUntil:
    visible:
      id: "review-save-button"
    timeout: 10000

# Verify all review fields are visible
- assertVisible:
    id: "review-activity-name"

- assertVisible:
    id: "review-activity-type"

- assertVisible:
    id: "review-discard-button"

- takeScreenshot: "recording-review-fields"

# Verify RPE rating section is visible
- assertVisible:
    id: "review-rpe"

# Verify trim section is visible
- assertVisible:
    id: "review-trim"

- takeScreenshot: "recording-review-rpe-and-trim"

# Clear the default name and enter a custom one with special characters
- tapOn:
    id: "review-activity-name"

- eraseText:
    charactersToErase: 50

- inputText: "Test Ride 2025"

- takeScreenshot: "recording-review-name-entered"

# Tap save — in demo mode this succeeds and navigates home
- tapOn:
    id: "review-save-button"

# Verify return to home screen (no crash)
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

- takeScreenshot: "recording-review-complete"
