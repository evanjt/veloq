# Route Detail Test
# Tests navigation to route detail screen

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Navigate to routes screen (bypass insights default)
- openLink: "veloq://routes"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "routes-screen"
    timeout: 10000

# Wait for routes list (may need tab switch from insights)
- extendedWaitUntil:
    visible:
      id: "routes-list"
    timeout: 15000
    optional: true

# Tap first route row (if any exist in demo data)
- tapOn:
    id: "route-row-0"
    optional: true

# If route detail loaded, verify screen
- extendedWaitUntil:
    visible:
      id: "route-detail-screen"
    timeout: 10000
    optional: true

- takeScreenshot: "route-detail-loaded"

# Scroll down to stats
- scroll
- takeScreenshot: "route-detail-scroll-stats"

# Scroll to sections/performances
- scroll
- takeScreenshot: "route-detail-scroll-sections"

- takeScreenshot: "route-detail-complete"
