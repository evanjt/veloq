# API Key Validation Test
# Tests that invalid API keys show an error

appId: com.veloq.app.dev
tags:
  - tier1
---
- launchApp

# Wait for login screen or home screen
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
    optional: true

# If we're on home screen (already logged in), log out first
- runFlow:
    when:
      visible:
        id: "home-screen"
    commands:
      - openLink: "veloq://settings"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - extendedWaitUntil:
          visible:
            id: "settings-screen"
          timeout: 10000
      - tapOn:
          id: "settings-account-row"
      - extendedWaitUntil:
          visible:
            id: "settings-logout-button"
          timeout: 10000
      - tapOn:
          id: "settings-logout-button"
      - tapOn: "Disconnect"
      - extendedWaitUntil:
          visible:
            id: "login-screen"
          timeout: 15000

# Now on login screen — expand API key section
- tapOn:
    id: "login-apikey-section"

- extendedWaitUntil:
    visible:
      id: "login-apikey-input"
    timeout: 5000

# Enter invalid API key
- tapOn:
    id: "login-apikey-input"
- inputText: "invalid-test-key"

# Dismiss keyboard then tap connect button
- hideKeyboard
- tapOn:
    id: "login-apikey-button"

# Wait for error to appear (network-dependent: real API call to intervals.icu)
- extendedWaitUntil:
    visible:
      id: "login-error-text"
    timeout: 25000
    optional: true

- takeScreenshot: "auth-api-key-error"

# Re-enter demo mode so other tests can run
- tapOn:
    id: "login-demo-button"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
