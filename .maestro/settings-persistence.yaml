# Settings Persistence Test
# Verifies theme setting persists across navigation

appId: com.veloq.app.dev
tags:
  - tier2
  - pack-settings
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Navigate directly to display settings page
- openLink: "veloq://display-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "theme-button-dark"
    timeout: 10000
    optional: true

# Switch to dark theme
- tapOn:
    id: "theme-button-dark"

- takeScreenshot: "settings-persistence-dark-set"

# Navigate away to fitness
- openLink: "veloq://fitness"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "fitness-screen"
    timeout: 10000

- takeScreenshot: "settings-persistence-navigated-away"

# Navigate back to display settings
- openLink: "veloq://display-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "theme-button-dark"
    timeout: 10000
    optional: true

# Verify dark theme button is still visible (settings persisted)
- assertVisible:
    id: "theme-button-dark"
    optional: true

- takeScreenshot: "settings-persistence-returned"

# Reset to system theme
- tapOn:
    id: "theme-button-system"

- takeScreenshot: "settings-persistence-complete"
