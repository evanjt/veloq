# Settings Theme Toggle Tests
# Tests theme switching in settings

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-settings.yaml

# Theme buttons live inside the Display section ~2 scrolls below the fold.
# SegmentedButtons (react-native-paper) only propagates the testID of the
# *currently selected* button on Android — tap by text label instead.
# scrollUntilVisible scrolls from center, hitting the detection sensitivity
# slider. Use small edge-margin swipes to scroll past it without overshooting.
- repeat:
    times: 3
    commands:
      - swipe:
          start: 90%, 60%
          end: 90%, 40%
          duration: 400
- extendedWaitUntil:
    visible:
      id: "settings-theme-toggle"
    timeout: 5000

# Switch to dark theme
- tapOn: "Dark"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "settings-theme-dark"

# After theme change, scroll to Appearance label
- swipe:
    start: 90%, 60%
    end: 90%, 40%
    duration: 400
    optional: true

# Switch to light theme
- tapOn: "Light"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "settings-theme-light"

# Switch back to system
- tapOn: "System"
- takeScreenshot: "settings-theme-system"
