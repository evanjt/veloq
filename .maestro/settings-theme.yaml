# Settings Theme Toggle Tests
# Tests theme switching in display settings

appId: com.veloq.app.dev
tags:
  - tier2
  - pack-settings
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Navigate directly to display settings page
- openLink: "veloq://display-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "settings-theme-toggle"
    timeout: 5000

# Switch to dark theme
- tapOn: "Dark"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "settings-theme-dark"

# Switch to light theme
- tapOn: "Light"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "settings-theme-light"

# Switch back to system
- tapOn: "System"
- takeScreenshot: "settings-theme-system"
