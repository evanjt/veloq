# Settings Theme Toggle Tests
# Tests theme switching in settings

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-settings.yaml

# Theme buttons live inside the Display section, several screens below the
# fold. SegmentedButtons (react-native-paper) only propagates the testID of
# the *currently selected* button to the queryable tree on Android — the
# unselected siblings render as Pressable wrappers without an accessible id.
# Scroll to the parent container (always visible) and tap by text label,
# which works regardless of which button is currently active.
- scrollUntilVisible:
    element:
      id: "settings-theme-toggle"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 20

# Switch to dark theme via text label (immune to SegmentedButtons testID quirks)
- tapOn: "Dark"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "settings-theme-dark"

# Re-scroll after theme change — re-render can shift the row off-screen
- scrollUntilVisible:
    element:
      id: "settings-theme-toggle"
    direction: DOWN
    timeout: 10000
    speed: 40
    visibilityPercentage: 20
    optional: true

# Switch to light theme
- tapOn: "Light"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "settings-theme-light"

# Re-scroll and switch back to system
- scrollUntilVisible:
    element:
      id: "settings-theme-toggle"
    direction: DOWN
    timeout: 10000
    speed: 40
    visibilityPercentage: 20
    optional: true
- tapOn: "System"
- takeScreenshot: "settings-theme-system"
