# Weekly Summary Component Tests
# Tests the weekly summary stats and time range toggles on training screen

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-training.yaml

# Verify weekly summary container is visible
- extendedWaitUntil:
    visible:
      id: "weekly-summary"
    timeout: 10000

# WeeklySummary is below the fold on the training screen. On Android the
# year button can overlap the tab bar — scroll it into view first.
- scrollUntilVisible:
    element:
      id: "weekly-summary-range-year"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 50

- tapOn:
    id: "weekly-summary-range-year"

- extendedWaitUntil:
    visible:
      id: "weekly-summary-count"
    timeout: 20000
    optional: true

- takeScreenshot: "home-weekly-summary-year"

- runFlow:
    when:
      visible:
        id: "weekly-summary-count"
    commands:
      - assertVisible:
          id: "weekly-summary-duration"
      - assertVisible:
          id: "weekly-summary-distance"
- runFlow:
    when:
      notVisible:
        id: "weekly-summary-count"
    commands:
      - extendedWaitUntil:
          visible:
            id: "weekly-summary-empty"
          timeout: 10000
          optional: true

# Verify values contain actual data (not NaN/empty)
- assertNotVisible:
    text: "NaN"
    optional: true

# Test other time range toggles
- tapOn:
    id: "weekly-summary-range-6m"
- assertVisible:
    id: "weekly-summary"
- takeScreenshot: "home-weekly-summary-6m"

- tapOn:
    id: "weekly-summary-range-3m"
- assertVisible:
    id: "weekly-summary"
- takeScreenshot: "home-weekly-summary-3m"

- tapOn:
    id: "weekly-summary-range-month"
- assertVisible:
    id: "weekly-summary"
- takeScreenshot: "home-weekly-summary-month"

- tapOn:
    id: "weekly-summary-range-week"
- assertVisible:
    id: "weekly-summary"
- takeScreenshot: "home-weekly-summary-week"

# Navigate back to home to check SummaryCard components.
# `veloq://` (root) lands on the feed reliably on iOS; on Android it can
# hang when bouncing through the deep-link handler — wait extra long there
# and tolerate the failure rather than blocking the whole flow.
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 20000
    optional: true

# Summary-card sub-checks are best-effort — only run them when home-screen
# actually rendered. The previous run was supposed to land us on home;
# if the deep-link didn't take, skip rather than fail the whole flow.
- runFlow:
    when:
      visible:
        id: "home-screen"
    commands:
      - assertVisible:
          id: "summary-card-form-zone"
          optional: true
      - assertVisible:
          id: "summary-card-sparkline"
          optional: true
      - takeScreenshot: "summary-card-features"

- takeScreenshot: "weekly-summary-complete"
