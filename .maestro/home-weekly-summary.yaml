# Weekly Summary Component Tests
# Tests the weekly summary stats and time range toggles on training screen

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-training.yaml

# Verify weekly summary container is visible
- extendedWaitUntil:
    visible:
      id: "weekly-summary"
    timeout: 10000

# Switch to year view first (demo data may not have activities in current week)
- tapOn:
    id: "weekly-summary-range-year"

- extendedWaitUntil:
    visible:
      id: "weekly-summary-count"
    timeout: 5000
- takeScreenshot: "home-weekly-summary-year"

# Verify all stats are displayed
- assertVisible:
    id: "weekly-summary-count"
- assertVisible:
    id: "weekly-summary-duration"
- assertVisible:
    id: "weekly-summary-distance"
- assertVisible:
    id: "weekly-summary-tss"

# Verify values contain actual data (not NaN/empty)
- assertNotVisible:
    text: "NaN"
    optional: true

# Test other time range toggles
- tapOn:
    id: "weekly-summary-range-6m"
- assertVisible:
    id: "weekly-summary"
- takeScreenshot: "home-weekly-summary-6m"

- tapOn:
    id: "weekly-summary-range-3m"
- assertVisible:
    id: "weekly-summary"
- takeScreenshot: "home-weekly-summary-3m"

- tapOn:
    id: "weekly-summary-range-month"
- assertVisible:
    id: "weekly-summary"
- takeScreenshot: "home-weekly-summary-month"

- tapOn:
    id: "weekly-summary-range-week"
- assertVisible:
    id: "weekly-summary"
- takeScreenshot: "home-weekly-summary-week"

# Navigate back to home to check SummaryCard components
- openLink: "veloq://home"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# Verify form zone indicator in summary card
- assertVisible:
    id: "summary-card-form-zone"
    optional: true

# Verify sparkline chart in summary card
- assertVisible:
    id: "summary-card-sparkline"
    optional: true

- takeScreenshot: "summary-card-features"

- takeScreenshot: "weekly-summary-complete"
