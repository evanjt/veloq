# Settings Logout Test
# Tests logout flow returns to login screen

appId: com.veloq.app.dev
tags:
  - tier2
onFlowComplete:
  - runFlow:
      when:
        visible:
          id: "login-screen"
      commands:
        - tapOn:
            id: "login-demo-button"
        - extendedWaitUntil:
            visible:
              id: "home-screen"
            timeout: 15000
            optional: true
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-settings.yaml

# Navigate to account sub-screen (logout button lives here)
- tapOn:
    id: "settings-account-row"

- extendedWaitUntil:
    visible:
      id: "settings-logout-button"
    timeout: 10000

# Scroll to find logout button (accept partial visibility)
- scrollUntilVisible:
    element:
      id: "settings-logout-button"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 20

# Extra swipe to move it well above the tab bar
- swipe:
    direction: UP
    duration: 500

# Tap logout button (triggers confirmation dialog)
- tapOn:
    id: "settings-logout-button"

# Wait for the destructive "Disconnect" button itself (more reliable on iOS
# than asserting the title — iOS Alert presentation can race the matcher).
- extendedWaitUntil:
    visible: "Disconnect"
    timeout: 10000

- takeScreenshot: "settings-logout-dialog"

# Tap the destructive "Disconnect" button
- tapOn: "Disconnect"

# Verify we return to login screen (async: cancel queries + clear caches + clear credentials)
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000

- takeScreenshot: "settings-logout-complete"

# Re-enter demo mode for subsequent tests
- tapOn:
    id: "login-demo-button"

# Dismiss any post-login dialogs
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"

- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
