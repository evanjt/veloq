# Storage Display
# US-X1: Settings shows WAL/SHM-inclusive disk usage; GB unit when large.

appId: com.veloq.app.dev
tags:
  - tier3
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-settings.yaml

- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 15000

- scrollUntilVisible:
    element:
      id: "settings-storage-stats"
    direction: DOWN
    timeout: 15000
    speed: 40
    optional: true

- assertVisible:
    id: "settings-storage-stats"
    optional: true

- takeScreenshot: "storage-display-visible"

# Demo mode won't hit the GB threshold; the assertion here is that the panel
# renders without NaN and shows a byte-unit-formatted value.
- assertNotVisible:
    text: "NaN"
- assertNotVisible:
    text: "undefined"
