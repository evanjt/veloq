# IAP regression test: validates the App Store rejection fix.
#
# The Apple reviewer screenshotted "Small Tip" / "Medium Tip" / "Large Tip"
# buttons without prices — those were fake fallback Product objects that
# rendered translation keys as displayPrice when fetchProducts() returned
# empty in their sandbox. Tapping them did nothing because StoreKit had
# no real products to sell. Apple flagged this as "buttons greyed out and
# not clickable".
#
# This flow covers BOTH places the same tips appear:
#   1. Settings → Support card (always visible)
#   2. Home feed → "Enjoying Veloq?" SupportCard (time-gated; we use the
#      developer dashboard to set lastActionDate to 31 days ago to force
#      it to appear).
#
# The fake fallback labels MUST NOT appear in either place. Either real
# tip prices or the GitHub Sponsors fallback is acceptable. In a sim
# without StoreKit Configuration wired into the Xcode scheme,
# fetchProducts returns empty, so GitHub Sponsors is what we expect.

appId: com.veloq.app.dev
tags:
  - tier1
  - pack-settings
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# ---- Surface 1: Settings → Support card ----

- runFlow:
    file: helpers/navigate-to-settings.yaml

- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "support-section"
    direction: DOWN
    timeout: 30000
    speed: 40

- assertVisible:
    id: "support-section"

# These exact strings are what the App Store reviewer screenshotted.
# They must NEVER appear in the Support section after the fallback removal.
- assertNotVisible:
    text: "Small Tip"
- assertNotVisible:
    text: "Medium Tip"
- assertNotVisible:
    text: "Large Tip"

# Either real tip buttons OR GitHub Sponsors fallback must be visible.
- runFlow:
    when:
      visible:
        id: "support-tip-buttons"
    commands:
      - takeScreenshot: "support-settings-real-products"

- runFlow:
    when:
      visible:
        id: "support-sponsor-button"
    commands:
      - assertVisible:
          text: "Sponsor on GitHub"
      - takeScreenshot: "support-settings-sponsor-fallback"

# ---- Enable debug mode by tapping version 5 times ----

- scrollUntilVisible:
    element:
      id: "settings-version-text"
    direction: DOWN
    timeout: 30000
    speed: 40

- tapOn:
    id: "settings-version-text"
- tapOn:
    id: "settings-version-text"
- tapOn:
    id: "settings-version-text"
- tapOn:
    id: "settings-version-text"
- tapOn:
    id: "settings-version-text"

- extendedWaitUntil:
    visible:
      id: "settings-debug-switch"
    timeout: 10000

# Toggle Debug Mode on
- tapOn:
    id: "settings-debug-switch"

- extendedWaitUntil:
    visible:
      id: "settings-developer-dashboard-link"
    timeout: 10000

- tapOn:
    id: "settings-developer-dashboard-link"

- extendedWaitUntil:
    visible:
      id: "debug-screen"
    timeout: 10000

# ---- Find Support Card section in dev dashboard, expand, set 31d ago ----

# The Support Card collapsible is collapsed by default — tap header to expand
- scrollUntilVisible:
    element:
      text: "Support Card"
    direction: DOWN
    timeout: 30000
    speed: 40

- tapOn:
    text: "Support Card"

- extendedWaitUntil:
    visible:
      id: "debug-support-preset-31d"
    timeout: 10000

- tapOn:
    id: "debug-support-preset-31d"

- takeScreenshot: "support-debug-set-31d-ago"

# ---- Surface 2: Home feed → SupportCard ----

# Navigate back to home feed; SupportCard should now appear since
# lastActionDate is 31 days ago, past the 7-day threshold.
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

- extendedWaitUntil:
    visible:
      id: "support-card"
    timeout: 10000

- assertVisible:
    id: "support-card"

# Expand the "Support development" section to reveal tip buttons
- tapOn:
    id: "support-card-tip-toggle"

# Wait for the expand animation (250ms) plus buffer
- extendedWaitUntil:
    visible:
      text: "Sponsor on GitHub"
    timeout: 5000
    optional: true

# Same regression check on this surface — fake labels must not appear
- assertNotVisible:
    text: "Small Tip"
- assertNotVisible:
    text: "Medium Tip"
- assertNotVisible:
    text: "Large Tip"

- runFlow:
    when:
      visible:
        id: "support-card-tip-buttons"
    commands:
      - takeScreenshot: "support-card-real-products"

- runFlow:
    when:
      visible:
        id: "support-card-sponsor-button"
    commands:
      - assertVisible:
          text: "Sponsor on GitHub"
      - takeScreenshot: "support-card-sponsor-fallback"

- takeScreenshot: "support-iap-complete"
