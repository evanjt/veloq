# IAP regression test: validates the App Store rejection fix.
#
# The Apple reviewer screenshotted "Small Tip" / "Medium Tip" / "Large Tip"
# buttons without prices — those were fake fallback Product objects that
# rendered translation keys as displayPrice when fetchProducts() returned
# empty in their sandbox. Tapping them did nothing because StoreKit had
# no real products to sell. Apple flagged this as "buttons greyed out and
# not clickable".
#
# This flow covers BOTH places the same tips appear:
#   1. Settings → Support card (always visible)
#   2. Home feed → "Enjoying Veloq?" SupportCard (time-gated; we use the
#      developer dashboard to set lastActionDate to 31 days ago to force
#      it to appear).
#
# The fake fallback labels MUST NOT appear in either place. Either real
# tip prices or the GitHub Sponsors fallback is acceptable.

appId: com.veloq.app.dev
tags:
  - tier1
  - pack-settings
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# ---- Surface 1: Support settings page ----

- openLink: "veloq://support-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "support-section"
    timeout: 10000
    optional: true

- assertVisible:
    id: "support-section"
    optional: true

- takeScreenshot: "support-settings-section"

# These exact strings are what the App Store reviewer screenshotted.
# They must NEVER appear in the Support section after the fallback removal.
- assertNotVisible:
    text: "Small Tip"
- assertNotVisible:
    text: "Medium Tip"
- assertNotVisible:
    text: "Large Tip"

# Either real tip buttons OR GitHub Sponsors fallback must be visible — both
# checked optionally so neither failing causes flow abort. The takeScreenshot
# above captured whichever variant rendered.
- assertVisible:
    id: "support-tip-buttons"
    optional: true
- assertVisible:
    id: "support-sponsor-button"
    optional: true

# ---- Enable debug mode by tapping version 5 times ----

# Navigate to settings hub where version text lives
- openLink: "veloq://settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "settings-version-text"
    direction: DOWN
    timeout: 30000
    speed: 40

- tapOn:
    id: "settings-version-text"
- tapOn:
    id: "settings-version-text"
- tapOn:
    id: "settings-version-text"
- tapOn:
    id: "settings-version-text"
- tapOn:
    id: "settings-version-text"

- extendedWaitUntil:
    visible:
      id: "settings-debug-switch"
    timeout: 10000

# Toggle Debug Mode on (idempotent — if it's already on the switch is a no-op)
- runFlow:
    when:
      notVisible:
        id: "settings-developer-dashboard-link"
    commands:
      - tapOn:
          id: "settings-debug-switch"

- extendedWaitUntil:
    visible:
      id: "settings-developer-dashboard-link"
    timeout: 10000

- tapOn:
    id: "settings-developer-dashboard-link"

- extendedWaitUntil:
    visible:
      id: "debug-screen"
    timeout: 10000

# ---- Find Support Card section in dev dashboard, expand, set 31d ago ----

# The Support Card collapsible is collapsed by default — tap header to expand.
# Use explicit edge swipes since the FFI metrics table can intercept centered swipes.
- repeat:
    times: 10
    commands:
      - swipe:
          start: 90%, 80%
          end: 90%, 25%
          duration: 400
      - runFlow:
          when:
            visible:
              id: "debug-section-support-card"
          commands:
            - assertVisible:
                id: "debug-section-support-card"

- assertVisible:
    id: "debug-section-support-card"

- tapOn:
    id: "debug-section-support-card"

- extendedWaitUntil:
    visible:
      id: "debug-support-preset-31d"
    timeout: 10000

- tapOn:
    id: "debug-support-preset-31d"

- takeScreenshot: "support-debug-set-31d-ago"

# ---- Surface 2: Home feed → SupportCard ----

# Navigate back to home feed; SupportCard should now appear since
# lastActionDate is 31 days ago, past the 7-day threshold AND dismissCount=0.
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

- extendedWaitUntil:
    visible:
      id: "support-card"
    timeout: 10000

- assertVisible:
    id: "support-card"

- takeScreenshot: "support-card-collapsed"

# Expand the "Support development" section to reveal tip buttons
- tapOn:
    id: "support-card-tip-toggle"

# Wait for the expand animation
- extendedWaitUntil:
    visible:
      id: "support-card-tip-buttons"
    timeout: 3000
    optional: true
- extendedWaitUntil:
    visible:
      id: "support-card-sponsor-button"
    timeout: 3000
    optional: true

- takeScreenshot: "support-card-expanded"

# Same regression check on this surface — fake labels must not appear
- assertNotVisible:
    text: "Small Tip"
- assertNotVisible:
    text: "Medium Tip"
- assertNotVisible:
    text: "Large Tip"

- assertVisible:
    id: "support-card-tip-buttons"
    optional: true
- assertVisible:
    id: "support-card-sponsor-button"
    optional: true

- takeScreenshot: "support-iap-complete"
