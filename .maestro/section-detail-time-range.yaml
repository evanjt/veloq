# Section Detail — Time Range Pills
# US-D1: time-range pills live inside the chart header (compact, not full-width)
# US-D2: traversal count + chart data reflect the selected range
#
# Real pill labels (from live UI inspection): 1M, 3M, 6M, 1Y, All

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-routes.yaml

- extendedWaitUntil:
    visible:
      id: "routes-screen"
    timeout: 15000
    optional: true

# Switch to Sections sub-tab (the Insights screen has Insights / Routes / Sections)
- tapOn:
    text: "Sections"
    optional: true

# Tap the first section in the list. Text matches "Section N" pattern used
# for auto-detected demo sections.
- tapOn:
    text: "^Section \\d+$"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Performance Over Time"
    timeout: 15000
    optional: true

- takeScreenshot: "section-detail-default-range"

# The chart header contains the time-range pills. "All" is the default.
- assertVisible:
    text: "All"

# Switch through each pill, capturing a screenshot at each stop.
- tapOn:
    text: "1M"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-1M"

- tapOn:
    text: "3M"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-3M"

- tapOn:
    text: "6M"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-6M"

- tapOn:
    text: "1Y"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-1Y"

- tapOn:
    text: "All"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-all"

# No NaN leakage in the stat rows when filters change
- assertNotVisible:
    text: "NaN"
- assertNotVisible:
    text: "undefined"

# Confirm the summary card surfaces below the chart (US-D4)
- scroll
- takeScreenshot: "section-detail-summary-history"
