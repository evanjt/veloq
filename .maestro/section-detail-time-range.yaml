# Section Detail — Time Range Pills
# US-D1: time-range pills live inside the chart header (compact, not full-width)
# US-D2: traversal count updates to reflect the selected range

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-routes.yaml

- extendedWaitUntil:
    visible:
      id: "routes-screen"
    timeout: 15000
    optional: true

# Tap on the Sections sub-tab if it exists
- tapOn:
    text: "Sections"
    optional: true

# Tap the first section row in the list
- tapOn:
    text: ".*Section.*"
    optional: true

- takeScreenshot: "section-detail-default-range"

# Switch to 30d / 90d / 1y pills — actual labels vary, use text match
- tapOn:
    text: "30d"
    optional: true
- takeScreenshot: "section-detail-30d"

- tapOn:
    text: "90d"
    optional: true
- takeScreenshot: "section-detail-90d"

- tapOn:
    text: "1y"
    optional: true
- takeScreenshot: "section-detail-1y"

- tapOn:
    text: "All"
    optional: true
- takeScreenshot: "section-detail-all"

# No NaN leakage in the stat rows when filters change
- assertNotVisible:
    text: "NaN"
