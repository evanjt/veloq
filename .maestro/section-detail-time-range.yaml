# Section Detail — Time Range Pills
# US-D1: time-range pills live inside the chart header (compact, not full-width)
# US-D2: traversal count + chart data reflect the selected range
#
# The Forward/Reverse counts shown per pill state are the strongest proof that
# the range filter is actually filtering data. Demo Section 7 has 62 total
# traversals across the Jan–Apr 2026 range; narrowing to 1M reduces the count
# meaningfully. We open that specific section by its text label for stability.

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-routes.yaml

- extendedWaitUntil:
    visible:
      id: "routes-screen"
    timeout: 15000
    optional: true

- tapOn:
    text: "Sections"
    optional: true

# Open Section 7 specifically — it has the highest visit count (62) in demo
# data, giving a meaningful delta between 1M and All time ranges.
- tapOn:
    text: "Section 7"

- extendedWaitUntil:
    visible:
      text: "Performance Over Time"
    timeout: 15000

- takeScreenshot: "section-detail-default-range"

# All pills must be present (US-D1)
- assertVisible:
    id: "section-time-range-1m"
- assertVisible:
    id: "section-time-range-3m"
- assertVisible:
    id: "section-time-range-6m"
- assertVisible:
    id: "section-time-range-1y"
- assertVisible:
    id: "section-time-range-all"

# Chart must be rendered at default ("All")
- assertVisible:
    text: "Hold to scrub through activities"

- tapOn:
    id: "section-time-range-1m"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-1M"
# Chart re-renders — scrub text must still be present
- assertVisible:
    text: "Hold to scrub through activities"

- tapOn:
    id: "section-time-range-3m"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-3M"
- assertVisible:
    text: "Hold to scrub through activities"

- tapOn:
    id: "section-time-range-6m"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-6M"

- tapOn:
    id: "section-time-range-1y"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-1Y"

- tapOn:
    id: "section-time-range-all"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-all"

- assertNotVisible:
    text: "NaN"
- assertNotVisible:
    text: "undefined"

# Summary card below the chart (US-D4) — First / Last / Best / Avg layout
- scroll
- takeScreenshot: "section-detail-summary-history"
- assertVisible:
    text: "First"
- assertVisible:
    text: "Best"
- assertVisible:
    text: "Avg"
