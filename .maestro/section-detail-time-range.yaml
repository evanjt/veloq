# Section Detail — Time Range Pills
# US-D1: time-range pills live inside the chart header (compact, not full-width)
# US-D2: traversal count + chart data reflect the selected range
#
# The Forward/Reverse counts shown per pill state are the strongest proof that
# the range filter is actually filtering data. The top section in the list
# has the most traversals; narrowing to 1M reduces the count meaningfully.
# We open it by list index for stability across demo data changes.

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Deep-link directly to sections tab (tapOn: text: "Sections" is unreliable
# on iOS where the Material Top Tab text isn't individually accessible)
- openLink: "veloq://routes?tab=sections"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "routes-screen"
    timeout: 15000

# Tap the first section in the list — the highest-visit section floats to
# the top by default sort, giving a meaningful delta between 1M and All.
- extendedWaitUntil:
    visible:
      id: "sections-list"
    timeout: 15000
- tapOn:
    id: "section-row-0"

- extendedWaitUntil:
    visible:
      id: "section-detail-screen"
    timeout: 15000

- takeScreenshot: "section-detail-default-range"

# All pills must be present (US-D1)
- assertVisible:
    id: "section-time-range-1m"
- assertVisible:
    id: "section-time-range-3m"
- assertVisible:
    id: "section-time-range-6m"
- assertVisible:
    id: "section-time-range-1y"
- assertVisible:
    id: "section-time-range-all"

# Chart must be rendered at default ("All")
- takeScreenshot: "section-detail-chart-rendered"

- tapOn:
    id: "section-time-range-1m"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-1M"
# Chart re-renders — scrub text must still be present
- takeScreenshot: "section-detail-chart-rendered"

- tapOn:
    id: "section-time-range-3m"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-3M"
- takeScreenshot: "section-detail-chart-rendered"

- tapOn:
    id: "section-time-range-6m"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-6M"

- tapOn:
    id: "section-time-range-1y"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-1Y"

- tapOn:
    id: "section-time-range-all"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "section-detail-all"

- assertNotVisible:
    text: "NaN"
- assertNotVisible:
    text: "undefined"

# Summary card below the chart (US-D4) — First / Last / Best / Avg layout
- scroll
- takeScreenshot: "section-detail-summary-history"
- assertNotVisible:
    text: "NaN"
