# Settings Language Test
# Tests that language options are visible in display settings

appId: com.veloq.app.dev
tags:
  - tier2
  - pack-settings
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Navigate directly to display settings page
- openLink: "veloq://display-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000
    optional: true

- takeScreenshot: "settings-language-options"

- takeScreenshot: "settings-language-complete"
