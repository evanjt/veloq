# Settings Units Toggle Test
# Tests: switching between metric and imperial units

appId: com.veloq.app.dev
tags:
  - tier2
  - pack-settings
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Navigate directly to display settings page
- openLink: "veloq://display-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

# Find and tap the unit toggle
- scrollUntilVisible:
    element:
      id: "settings-unit-toggle"
    direction: DOWN
    timeout: 10000
    speed: 40
    optional: true

- tapOn:
    id: "settings-unit-toggle"
    optional: true

- takeScreenshot: "settings-units-toggled"

# Navigate to home to verify units applied
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

- takeScreenshot: "settings-units-applied"

# Return to display settings and toggle back
- openLink: "veloq://display-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- scrollUntilVisible:
    element:
      id: "settings-unit-toggle"
    direction: DOWN
    timeout: 10000
    speed: 40
    optional: true

- tapOn:
    id: "settings-unit-toggle"
    optional: true

- takeScreenshot: "settings-units-toggle-complete"
