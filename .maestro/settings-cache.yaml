# Settings Cache Test
# Tests cache clear button exists and is interactive

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-settings.yaml

# Navigate to cache settings sub-screen
- openLink: "veloq://cache-settings"

- extendedWaitUntil:
    visible:
      id: "settings-clear-cache"
    timeout: 10000

# Scroll down to find clear cache button
- scrollUntilVisible:
    element:
      id: "settings-clear-cache"
    direction: DOWN
    timeout: 10000
    speed: 40

- takeScreenshot: "settings-cache-section"

- takeScreenshot: "settings-cache-complete"
