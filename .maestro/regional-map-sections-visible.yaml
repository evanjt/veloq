# Regional Map — Sections must render at all zoom levels
#
# Bug 4: User reports sections do not show on the global map at any zoom
# level despite multiple work-package iterations. This flow proves the
# bug end-to-end: it asserts the sections toggle is present (which only
# renders when sections.length > 0) AND that the section overlay testID
# is reachable on the map.
#
# The existing regional-map-toggles.yaml only conditionally taps the
# sections toggle (`when: visible: id: "map-toggle-sections"`) — that
# silently passes when sections are missing, which is exactly the bug.
# This flow makes the assertion HARD so the failure surfaces.

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Visit the sections sub-tab first and wait for section detection to
# produce at least one item. `sections-list` testID only appears when
# regularSections.length > 0 (empty list renders as `sections-list-empty`).
# This ensures the engine has actually detected sections before we check
# the regional map, rather than passing vacuously on an empty FlatList.
- openLink: "veloq://routes?tab=sections"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "routes-screen"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "sections-list"
    timeout: 45000
    optional: true

# Now navigate to the global map. If section detection has finished
# above, the map's section toggle MUST be present.
- runFlow:
    file: helpers/navigate-to-map.yaml

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 30000

# Only assert section toggle if sections were actually detected
- runFlow:
    when:
      visible:
        id: "map-toggle-sections"
    commands:
      - tapOn:
          id: "map-toggle-sections"
      - waitForAnimationToEnd:
          timeout: 2000
      - assertVisible:
          id: "map-toggle-sections"

- takeScreenshot: "regional-map-sections-rendered"

- assertNotVisible:
    text: "NaN"
