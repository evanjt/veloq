# Fitness Scroll Test
# Scrolls through the fitness screen including collapsible sections

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml
- runFlow:
    file: helpers/navigate-to-fitness.yaml

- extendedWaitUntil:
    visible:
      id: "fitness-screen"
    timeout: 10000

# Screenshot the top (CTL/ATL chart)
- takeScreenshot: "fitness-scroll-chart"

# Scroll down to see sections below the chart
- scroll
- takeScreenshot: "fitness-scroll-below-chart"

# Expand performance section and screenshot
- tapOn:
    id: "fitness-section-performance"
    optional: true
- takeScreenshot: "fitness-scroll-performance-expanded"

# Scroll more
- scroll
- takeScreenshot: "fitness-scroll-mid"

# Scroll to bottom
- scroll
- takeScreenshot: "fitness-scroll-bottom"

# Verify no NaN
- assertNotVisible:
    text: "NaN"
    optional: true

- takeScreenshot: "fitness-scroll-complete"
