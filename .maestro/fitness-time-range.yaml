# Fitness Time Range Test
# Tests switching time ranges on fitness screen

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-fitness.yaml

# Verify time range selector exists
- assertVisible:
    id: "fitness-time-range-selector"

# Switch through available time ranges
- tapOn:
    id: "fitness-range-6m"
    optional: true
- takeScreenshot: "fitness-time-range-6m"

- tapOn:
    id: "fitness-range-1y"
    optional: true
- takeScreenshot: "fitness-time-range-1y"

- tapOn:
    id: "fitness-range-all"
    optional: true
- takeScreenshot: "fitness-time-range-all"

- tapOn:
    id: "fitness-range-3m"
    optional: true
- takeScreenshot: "fitness-time-range-3m"

- takeScreenshot: "fitness-time-range-complete"
