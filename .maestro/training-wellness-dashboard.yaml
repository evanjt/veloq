# Training Wellness Dashboard Test
# Tests wellness indicators on the training screen

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-training.yaml

# Verify training screen loads (WellnessDashboard component is not rendered here;
# wellness data is shown via WellnessTrendsChart and WeeklySummary)
- extendedWaitUntil:
    visible:
      id: "training-screen"
    timeout: 10000
- takeScreenshot: "training-wellness-dashboard-loaded"

# Scroll down to verify weekly summary loads (deferred below fold)
- scrollUntilVisible:
    element:
      id: "weekly-summary"
    direction: DOWN
    timeout: 15000
    speed: 40

- takeScreenshot: "training-wellness-dashboard-complete"
