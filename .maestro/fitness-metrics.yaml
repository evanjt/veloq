# Fitness Metrics Tests
# Tests the fitness chart CTL/ATL values display

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-fitness.yaml

# Verify CTL (fitness) value is displayed
- extendedWaitUntil:
    visible:
      id: "fitness-ctl-value"
    timeout: 10000

# Verify CTL value is not NaN
- assertNotVisible:
    text: "NaN"
    optional: true

# Verify ATL (fatigue) value is displayed
- assertVisible:
    id: "fitness-atl-value"

# Verify ATL value is not NaN
- assertNotVisible:
    text: "NaN"
    optional: true

- takeScreenshot: "fitness-metrics-ctl-loaded"

- takeScreenshot: "fitness-metrics-complete"
