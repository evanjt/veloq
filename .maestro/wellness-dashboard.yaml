# Wellness Dashboard Tests
# Tests the wellness metrics display (HRV, RHR, sleep, etc.)
# Wellness content lives on the training tab

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-training.yaml

# Verify training screen loaded (WellnessDashboard component is not rendered here;
# wellness data is shown via WellnessTrendsChart and WeeklySummary)
- extendedWaitUntil:
    visible:
      id: "training-screen"
    timeout: 10000
- takeScreenshot: "wellness-dashboard-data-loaded"

# Scroll down to verify weekly summary loads (deferred below fold)
- scrollUntilVisible:
    element:
      id: "weekly-summary"
    direction: DOWN
    timeout: 15000
    speed: 40

- takeScreenshot: "wellness-dashboard-complete"
