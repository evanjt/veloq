# Test activity deep link
- openLink: "veloq://activity/demo-test-0"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "activity-detail-screen"
    timeout: 15000
- takeScreenshot: "navigation-deep-links-activity"

# Test nonexistent activity deep link (verify no crash)
- openLink: "veloq://activity/nonexistent-id"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 5000
    optional: true

# Verify app is still responsive by navigating home
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

- takeScreenshot: "navigation-deep-links-complete"
