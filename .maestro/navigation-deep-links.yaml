# Deep Link Navigation Regression
# Tests all deep links work and don't crash the app

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Test fitness deep link
- openLink: "veloq://fitness"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "fitness-screen"
    timeout: 10000
- takeScreenshot: "navigation-deep-links-fitness"

# Test training deep link
- openLink: "veloq://training"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
