# Settings Deep Links Test
# Tests: deep linking to specific settings sections

appId: com.veloq.app.dev
tags:
  - tier2
  - pack-nav
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Deep link to cache settings page
- openLink: "veloq://cache-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "settings-clear-cache"
    timeout: 10000
    optional: true

- takeScreenshot: "deep-link-settings-cache"

# Deep link to notification settings page
- openLink: "veloq://notification-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "settings-notifications-toggle"
    timeout: 10000
    optional: true

- takeScreenshot: "deep-link-settings-notifications"

- takeScreenshot: "navigation-deep-links-settings-complete"
