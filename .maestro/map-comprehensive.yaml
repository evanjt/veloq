# Comprehensive Map Integration Test
# Tests map features: activities, routes, sections, popups, filters, and toggles

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-map.yaml

# Wait for map controls to load (requires: MapLibre init + engine ready + activities fetched)
- extendedWaitUntil:
    visible:
      id: "map-toggle-activities"
    timeout: 45000
    optional: true

- takeScreenshot: "map-controls-loaded"

# =============================================================================
# Activity Markers - Basic Interaction
# =============================================================================

- tapOn:
    id: "map-fit-all"
    optional: true

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

- tapOn:
    id: "map-activity-marker-demo-test-0"
    optional: true

- extendedWaitUntil:
    visible:
      id: "activity-popup"
    timeout: 3000
    optional: true

- takeScreenshot: "map-activity-popup"

- tapOn:
    id: "activity-popup-zoom"
    optional: true

- extendedWaitUntil:
    visible:
      id: "activity-popup"
    timeout: 2000
    optional: true

- tapOn:
    id: "activity-popup-close"
    optional: true

- extendedWaitUntil:
    notVisible:
      id: "activity-popup"
    timeout: 2000
    optional: true

# =============================================================================
# Activity Details Navigation
# =============================================================================

- openLink: "veloq://map"

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: "map-toggle-activities"
    timeout: 3000

- tapOn:
    id: "map-activity-marker-demo-test-0"
    optional: true

- extendedWaitUntil:
    visible:
      id: "activity-popup"
    timeout: 3000
    optional: true

- tapOn:
    id: "activity-popup-view-details"
    optional: true

- extendedWaitUntil:
    visible:
      id: "activity-detail-screen"
    timeout: 10000
    optional: true

- openLink: "veloq://map"

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 10000

# =============================================================================
# Multi-Marker Test
# =============================================================================

- tapOn:
    id: "map-fit-all"
    optional: true

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

- tapOn:
    id: "map-activity-marker-demo-test-0"
    optional: true
- extendedWaitUntil:
    visible:
      id: "activity-popup"
    timeout: 2000
    optional: true
- tapOn:
    id: "activity-popup-close"
    optional: true

- tapOn:
    id: "map-activity-marker-demo-test-1"
    optional: true
- extendedWaitUntil:
    visible:
      id: "activity-popup"
    timeout: 2000
    optional: true
- tapOn:
    id: "activity-popup-close"
    optional: true

- tapOn:
    id: "map-activity-marker-demo-test-2"
    optional: true
- extendedWaitUntil:
    visible:
      id: "activity-popup"
    timeout: 2000
    optional: true
- tapOn:
    id: "activity-popup-close"
    optional: true

- tapOn:
    id: "map-activity-marker-demo-test-3"
    optional: true
- extendedWaitUntil:
    visible:
      id: "activity-popup"
    timeout: 2000
    optional: true
- tapOn:
    id: "activity-popup-close"
    optional: true

- tapOn:
    id: "map-activity-marker-demo-test-4"
    optional: true
- extendedWaitUntil:
    visible:
      id: "activity-popup"
    timeout: 2000
    optional: true
- tapOn:
    id: "activity-popup-close"
    optional: true

# =============================================================================
# Sport Type Filters
# =============================================================================

- tapOn:
    id: "map-filter-ride"
    optional: true

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

- tapOn:
    id: "map-filter-run"
    optional: true

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

- tapOn:
    id: "map-filter-swim"
    optional: true

- tapOn:
    id: "map-filter-hike"
    optional: true

- takeScreenshot: "map-filter-applied"

- tapOn:
    id: "map-filter-clear"
    optional: true

# =============================================================================
# Layer Toggles
# =============================================================================

# Wait for map controls to be available after filter interactions
- extendedWaitUntil:
    visible:
      id: "map-toggle-activities"
    timeout: 30000
    optional: true

- tapOn:
    id: "map-toggle-activities"

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

- extendedWaitUntil:
    visible:
      id: "map-toggle-sections"
    timeout: 20000
    optional: true

- tapOn:
    id: "map-toggle-sections"
    optional: true

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

- tapOn:
    id: "map-toggle-routes"

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

# Toggle back on
- tapOn:
    id: "map-toggle-routes"

- tapOn:
    id: "map-toggle-sections"
    optional: true

- tapOn:
    id: "map-toggle-activities"

- takeScreenshot: "map-layers-toggled"

# =============================================================================
# Section/Route Popup Interaction
# =============================================================================

# With sections layer on, try to tap a section marker
- tapOn:
    id: "map-section-marker-0"
    optional: true

- extendedWaitUntil:
    visible:
      id: "section-popup"
    timeout: 3000
    optional: true

- tapOn:
    id: "section-popup-close"
    optional: true

# Try route marker popup
- tapOn:
    id: "map-route-marker-0"
    optional: true

- extendedWaitUntil:
    visible:
      id: "route-popup"
    timeout: 3000
    optional: true

- tapOn:
    id: "route-popup-close"
    optional: true

- takeScreenshot: "map-section-route-popups"

# =============================================================================
# Toggle Stress Test
# =============================================================================

- repeat:
    times: 4
    commands:
      - tapOn:
          id: "map-toggle-activities"
      - tapOn:
          id: "map-toggle-routes"
      - tapOn:
          id: "map-toggle-sections"
          optional: true

# =============================================================================
# Map Controls (compass, location, fit)
# Note: 3D mode skipped — Map3DWebView (WebGL WebView) crashes on emulator
# =============================================================================

- tapOn:
    id: "map-compass"
    optional: true

- tapOn:
    id: "map-location"
    optional: true

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

- tapOn:
    id: "map-fit-all"
    optional: true

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 2000

- takeScreenshot: "map-controls-used"

# =============================================================================
# Final State Validation
# =============================================================================

- assertVisible:
    id: "map-screen"

- takeScreenshot: "map-comprehensive-complete"
