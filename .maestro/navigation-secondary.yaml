# Secondary Screen Navigation Tests
# Tests navigation to settings, about, routes

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Settings screen
- runFlow:
    file: helpers/navigate-to-settings.yaml
- takeScreenshot: "navigation-secondary-settings"

# About screen
- openLink: "veloq://about"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "about-screen"
    timeout: 10000
- takeScreenshot: "navigation-secondary-about"

# Back to home
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# Routes screen
- runFlow:
    file: helpers/navigate-to-routes.yaml
- takeScreenshot: "navigation-secondary-routes"

# Return home
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
