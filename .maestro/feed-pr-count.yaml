# Feed Card PR Count
# US-F2: activity with multiple PRs across directions shows the full count
# (dedup regression — the bug was counting (sectionId) not (sectionId, direction),
# so 1 forward + 2 reverse PRs appeared as 2 instead of 3).

appId: com.veloq.app.dev
tags:
  - tier1
  - pack-home
  # Quarantined from the blocking gate core: card->detail nav is intermittent
  # under the CI software GPU. Runs in the gate's non-blocking flaky lane.
  - flaky
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- extendedWaitUntil:
    visible:
      id: "home-activity-list"
    timeout: 15000

# Screenshot the feed so PR pill counts are visible for visual regression review.
- takeScreenshot: "feed-pr-count-baseline"

# Open the first activity (demo-test-0 — top card) and compare its Sections tab
# count against what the feed card surfaced. The tap occasionally fails to
# register under the CI software GPU, so retry the tap + screen wait.
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "activity-card-demo-test-0"
      - extendedWaitUntil:
          visible:
            id: "activity-detail-screen"
          timeout: 15000

- extendedWaitUntil:
    visible:
      id: "activity-detail-content"
    timeout: 20000

- tapOn:
    text: "Sections"
    optional: true

- extendedWaitUntil:
    visible:
      id: "activity-sections-list"
    timeout: 10000
    optional: true

- takeScreenshot: "feed-pr-count-sections-tab"

# Manual verification: the feed card's PR count must equal the number of
# trophy icons shown here on the Sections tab. Screenshots support review.
