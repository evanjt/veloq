# Critical Path E2E Test
#
# Covers the core user journey in a single flow:
# Auth > Home feed > Activity detail > Charts > Fitness > Training > Map > Routes > Settings

appId: com.veloq.app.dev
tags:
  - tier1
---
# ── Launch & Auth ───────────────────────────────────────
- runFlow:
    file: helpers/setup-demo-mode.yaml

# ── Home Feed ───────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "home-activity-list"
    timeout: 15000

- takeScreenshot: "critical-home"

- tapOn:
    id: "activity-card-demo-.*"

# ── Activity Detail ─────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "activity-detail-screen"
    timeout: 15000

- assertVisible:
    id: "activity-detail-content"

- runFlow:
    when:
      visible:
        id: "chart-type-selector"
    commands:
      - tapOn:
          id: "chart-type-heartrate"
          optional: true
      - tapOn:
          id: "chart-type-power"
          optional: true
      - tapOn:
          id: "chart-type-elevation"
          optional: true

- back

# ── Fitness Tab ─────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-fitness.yaml

- assertVisible:
    id: "fitness-ctl-value"
    optional: true

- assertVisible:
    id: "fitness-atl-value"
    optional: true

- takeScreenshot: "critical-fitness"

# ── Training Tab ────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-training.yaml

- assertVisible:
    id: "weekly-summary"
    optional: true

- takeScreenshot: "critical-training"

# ── Map Tab ─────────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-map.yaml

- assertVisible:
    id: "map-fit-all"
    optional: true

- takeScreenshot: "critical-map"

# ── Routes Tab ──────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-routes.yaml

- takeScreenshot: "critical-routes"

# ── Settings ────────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-settings.yaml

- takeScreenshot: "critical-settings"

# ── Return to Home ──────────────────────────────────────
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

- assertVisible:
    id: "home-activity-list"

- takeScreenshot: "critical-home-return"
