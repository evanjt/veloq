# Critical Path E2E Test
#
# Covers the core user journey in a single flow:
# Auth > Home feed > Activity detail > Charts > Fitness > Training > Map > Routes > Settings

appId: com.veloq.app.dev
tags:
  - tier1
  - pack-nav
  # Quarantined from the blocking gate core: this end-to-end sweep touches the
  # map/charts and is the most sensitive to CI software-GPU flakiness. Runs in
  # the gate's non-blocking flaky lane.
  - flaky
---
# ── Launch & Auth ───────────────────────────────────────
- runFlow:
    file: helpers/setup-demo-mode.yaml

# ── Home Feed ───────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "home-activity-list"
    timeout: 15000

- takeScreenshot: "critical-home"

# ── Activity Detail ─────────────────────────────────────
# Tap the card overlay specifically (a regex like activity-card-demo-.* also
# matches child chips/pills that deep-link to a sub-tab). The tap occasionally
# fails to register under the CI software GPU, so retry the tap + screen wait.
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "activity-card-demo-test-0"
      - extendedWaitUntil:
          visible:
            id: "activity-detail-screen"
          timeout: 15000

- extendedWaitUntil:
    visible:
      id: "activity-detail-content"
    timeout: 15000

- runFlow:
    when:
      visible:
        id: "chart-type-selector"
    commands:
      - tapOn:
          id: "chart-type-heartrate"
          optional: true
      - tapOn:
          id: "chart-type-power"
          optional: true
      - tapOn:
          id: "chart-type-elevation"
          optional: true

- back

# ── Fitness Tab ─────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-fitness.yaml

- assertVisible:
    id: "fitness-ctl-value"
    optional: true

- assertVisible:
    id: "fitness-atl-value"
    optional: true

- takeScreenshot: "critical-fitness"

# ── Training Tab ────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-training.yaml

- assertVisible:
    id: "weekly-summary"
    optional: true

- takeScreenshot: "critical-training"

# ── Map Tab ─────────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-map.yaml

- assertVisible:
    id: "map-fit-all"
    optional: true

- takeScreenshot: "critical-map"

# ── Routes Tab ──────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-routes.yaml

- takeScreenshot: "critical-routes"

# ── Settings ────────────────────────────────────────────
- runFlow:
    file: helpers/navigate-to-settings.yaml

- takeScreenshot: "critical-settings"

# ── Return to Home ──────────────────────────────────────
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

- assertVisible:
    id: "home-activity-list"

- takeScreenshot: "critical-home-return"
