# Activity Card Stats Tests
# Tests that activity cards display and navigate to detail

appId: com.veloq.app.dev
tags:
  - tier2
  - pack-activity
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Wait for activity list to load
- extendedWaitUntil:
    visible:
      id: "home-activity-list"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "activity-card-demo-.*"
    timeout: 10000

- takeScreenshot: "activity-card-stats-list-loaded"

# Tap on the first visible activity card
- tapOn:
    id: "activity-card-demo-.*"

- extendedWaitUntil:
    visible:
      id: "activity-detail-screen"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "activity-detail-content"
    timeout: 15000

# Scroll past map header to charts area (SwipeableTabs gesture on iOS can
# block visibility detection of elements below the map)
- scroll

# Verify full detail loaded (chart type selector indicates charts rendered)
- extendedWaitUntil:
    visible:
      id: "chart-type-selector"
    timeout: 30000

# Verify no invalid values
- assertNotVisible:
    text: "NaN"
- assertNotVisible:
    text: "undefined"

- takeScreenshot: "activity-card-stats-detail-loaded"
