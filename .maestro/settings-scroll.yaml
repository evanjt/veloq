# Settings Scroll Test
# Scrolls through the settings hub with screenshots

appId: com.veloq.app.dev
tags:
  - tier2
  - pack-settings
---
- runFlow:
    file: helpers/setup-demo-mode.yaml
- runFlow:
    file: helpers/navigate-to-settings.yaml

# Screenshot above the fold
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000
- takeScreenshot: "settings-scroll-top"

# Scroll to bottom to find version text
- scroll
- takeScreenshot: "settings-scroll-mid"

- scrollUntilVisible:
    element:
      id: "settings-version-text"
    direction: DOWN
    timeout: 10000
    speed: 40
- takeScreenshot: "settings-scroll-bottom"

- takeScreenshot: "settings-scroll-complete"
