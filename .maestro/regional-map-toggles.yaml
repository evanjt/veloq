# Regional Map — Layer Toggles
# US-R1: heatmap / routes / activities are independent controls (sections toggle
#        conditional on global section presence — absent in fresh demo mode)
# US-R2: toggling layers is reflected in map state

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-map.yaml

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 30000

# Core toggles are always present regardless of data state.
- assertVisible:
    id: "map-toggle-heatmap"
- assertVisible:
    id: "map-toggle-activities"
- assertVisible:
    id: "map-toggle-3d"

# Routes toggle is data-conditional (routeCount > 0). Sections toggle likewise.
# Take a screenshot of initial state — hardcoded assertion of presence is
# fragile because demo mode may or may not detect routes by the time this runs.
- takeScreenshot: "regional-map-default"

# Activate heatmap and screenshot — trace colour should shift when selecting
# an activity (covered separately; here we verify the toggle fires).
- tapOn:
    id: "map-toggle-heatmap"
- takeScreenshot: "regional-map-heatmap-on"

# Turn heatmap off again to confirm it's independent of activity layer.
- tapOn:
    id: "map-toggle-heatmap"
- takeScreenshot: "regional-map-heatmap-off"

# Activities toggle — off should hide traces.
- tapOn:
    id: "map-toggle-activities"
- takeScreenshot: "regional-map-activities-off"
- tapOn:
    id: "map-toggle-activities"
- takeScreenshot: "regional-map-activities-on"

# Routes toggle (conditional — only present if routeCount > 0). Flow must not
# fail if the toggle isn't rendered.
- runFlow:
    when:
      visible:
        id: "map-toggle-routes"
    commands:
      - tapOn:
          id: "map-toggle-routes"
      - takeScreenshot: "regional-map-routes-toggled"

# Sections toggle (conditional — only present if sections.length > 0)
- runFlow:
    when:
      visible:
        id: "map-toggle-sections"
    commands:
      - tapOn:
          id: "map-toggle-sections"
      - takeScreenshot: "regional-map-sections-toggled"

- assertNotVisible:
    text: "NaN"
