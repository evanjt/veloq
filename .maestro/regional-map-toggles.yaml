# Regional Map — Layer Toggles
# US-R1: heatmap / routes / sections are independent controls
# US-R2: toggling layers changes which polylines / heat render

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-map.yaml

- extendedWaitUntil:
    visible:
      id: "map-screen"
    timeout: 30000

# All three toggles must be present as independent buttons.
- assertVisible:
    id: "map-toggle-heatmap"
- assertVisible:
    id: "map-toggle-sections"
- assertVisible:
    id: "map-toggle-routes"
- assertVisible:
    id: "map-toggle-activities"

- takeScreenshot: "regional-map-default"

# Activate heatmap — trace colour should shift to brand orange when an activity
# is selected (US-R3 covers that; here we just verify the toggle fires).
- tapOn:
    id: "map-toggle-heatmap"
- takeScreenshot: "regional-map-heatmap-on"

# Toggle sections off, then back on — proves layer is independent
- tapOn:
    id: "map-toggle-sections"
- takeScreenshot: "regional-map-sections-off"
- tapOn:
    id: "map-toggle-sections"
- takeScreenshot: "regional-map-sections-on"

# Toggle routes independently
- tapOn:
    id: "map-toggle-routes"
- takeScreenshot: "regional-map-routes-on"

- assertNotVisible:
    text: "NaN"
