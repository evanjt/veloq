# Activity Detail Scroll Test
# Scrolls through the full activity detail screen with screenshots

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Wait for data then open activity
- extendedWaitUntil:
    visible:
      id: "home-activity-list"
    timeout: 15000
- openLink: "veloq://activity/demo-test-0"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "activity-detail-content"
    timeout: 15000

# Screenshot hero section (map + title)
- takeScreenshot: "activity-detail-scroll-hero"

# Scroll down to stats (swipe up to scroll down, avoids panning map)
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 500
- takeScreenshot: "activity-detail-scroll-stats"

# Scroll to charts
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 500
- takeScreenshot: "activity-detail-scroll-charts"

# Scroll further
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 500
- takeScreenshot: "activity-detail-scroll-mid"

# Scroll to bottom
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 500
- takeScreenshot: "activity-detail-scroll-bottom"

- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 500
- takeScreenshot: "activity-detail-scroll-end"

# Verify no NaN anywhere on page
- assertNotVisible:
    text: "NaN"
- assertNotVisible:
    text: "undefined"

- takeScreenshot: "activity-detail-scroll-complete"
