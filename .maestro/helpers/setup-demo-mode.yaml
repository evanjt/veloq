# Launch app, enter demo mode if needed, wait for home screen
# Works on both emulators (with root) and physical devices (without root)
appId: com.veloq.app.dev
---
- launchApp

# Wait for either login screen or home screen
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
    optional: true

# If login screen is visible, enter demo mode
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-demo-button"

# Dismiss any system alerts
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
