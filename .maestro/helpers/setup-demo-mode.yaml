# Launch app, enter demo mode if needed, wait for home screen
# Works on emulators, simulators, and physical devices
appId: com.veloq.app.dev
---
- launchApp

# Dismiss iOS "Open in Veloq?" deep link confirmation
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

# Wait for either login screen or home screen
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
    optional: true

# If login screen is visible, enter demo mode
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-demo-button"

# Dismiss any system alerts (e.g. "Not Now" for notifications)
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"

# Dismiss Activity Notifications dialog if present
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"

# Dismiss WhatsNewModal if present (auto-triggers on new version)
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
