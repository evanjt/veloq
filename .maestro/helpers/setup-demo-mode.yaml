# Launch app, enter demo mode if needed, wait for home screen
# Works on emulators, simulators, and physical devices
# Handles: login, system alerts, Activity Notifications, WhatsNewModal
appId: com.veloq.app.dev
---
- launchApp:
    clearState: false

# Dismiss iOS "Open in Veloq?" deep link confirmation
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

# Wait for either login screen or home screen
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
    optional: true

# If login screen is visible, enter demo mode
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-demo-button"

# After demo login, multiple dialogs may appear in sequence.
# Wait for SOMETHING to show up (home screen, a dialog, or WhatsNewModal)
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
    optional: true

# Dismiss any system alerts (e.g. "Not Now" for notifications)
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"

# Dismiss Activity Notifications dialog if present
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"

# Dismiss WhatsNewModal if present (auto-triggers on new app version)
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

# Final wait for home screen (should be visible now after all dialogs dismissed)
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
    optional: true

# Recovery: if home-screen not visible, relaunch and re-dismiss all dialogs
- runFlow:
    when:
      notVisible:
        id: "home-screen"
    commands:
      - launchApp:
          clearState: false
      - extendedWaitUntil:
          visible:
            id: "home-screen"
          timeout: 15000
          optional: true
      - runFlow:
          when:
            visible: "Not Now"
          commands:
            - tapOn: "Not Now"
      - runFlow:
          when:
            visible: "Done"
          commands:
            - tapOn: "Done"
      - runFlow:
          when:
            visible: "Skip"
          commands:
            - tapOn: "Skip"
      - extendedWaitUntil:
          visible:
            id: "home-screen"
          timeout: 30000
