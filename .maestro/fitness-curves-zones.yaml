# Fitness Curves and Zones Test
# Tests: power/pace curves, zone distribution, season bests, FTP trend, decoupling

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-fitness.yaml

- extendedWaitUntil:
    visible:
      id: "fitness-screen"
    timeout: 10000

# Scroll to performance section and verify it exists (don't expand — keeps page short)
- scrollUntilVisible:
    element:
      id: "fitness-section-performance"
    direction: DOWN
    timeout: 15000
    speed: 40

- takeScreenshot: "fitness-performance-header"

# Scroll to season bests section
- scrollUntilVisible:
    element:
      id: "fitness-section-bests"
    direction: DOWN
    timeout: 15000
    speed: 40

- takeScreenshot: "fitness-bests-header"

# Scroll to zones section (may not exist for all sport types)
- scrollUntilVisible:
    element:
      id: "fitness-section-zones"
    direction: DOWN
    timeout: 15000
    speed: 40
    optional: true

# Expand zones and screenshot
- runFlow:
    when:
      visible:
        id: "fitness-section-zones"
    commands:
      - tapOn:
          id: "fitness-section-zones"
      - takeScreenshot: "fitness-zones-expanded"
      - tapOn:
          id: "fitness-section-zones"

# Scroll to trends section
- scrollUntilVisible:
    element:
      id: "fitness-section-trends"
    direction: DOWN
    timeout: 15000
    speed: 40
    optional: true

- takeScreenshot: "fitness-trends-header"

# Scroll to threshold section (FTP trend)
- scrollUntilVisible:
    element:
      id: "fitness-section-threshold"
    direction: DOWN
    timeout: 15000
    speed: 40
    optional: true

- takeScreenshot: "fitness-threshold-header"

# Scroll to efficiency section (decoupling)
- scrollUntilVisible:
    element:
      id: "fitness-section-efficiency"
    direction: DOWN
    timeout: 15000
    speed: 40
    optional: true

- takeScreenshot: "fitness-efficiency-header"

# Verify no NaN anywhere
- assertNotVisible:
    text: "NaN"

- takeScreenshot: "fitness-curves-zones-complete"
