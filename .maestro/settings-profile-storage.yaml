# Settings Profile and Storage Test
# Tests: profile section on hub, storage stats on cache page

appId: com.veloq.app.dev
tags:
  - tier2
  - pack-settings
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

- runFlow:
    file: helpers/navigate-to-settings.yaml

# Wait for settings screen
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

# Verify account row visible on hub
- assertVisible:
    id: "settings-account-row"
    optional: true

- takeScreenshot: "settings-profile"

# Navigate to cache settings for storage stats
- openLink: "veloq://cache-settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"

# Scroll to storage stats
- scrollUntilVisible:
    element:
      id: "settings-storage-stats"
    direction: DOWN
    timeout: 10000
    speed: 40
    optional: true

- assertVisible:
    id: "settings-storage-stats"
    optional: true

- takeScreenshot: "settings-storage-stats"

# Scroll to tile cache
- scrollUntilVisible:
    element:
      id: "settings-tile-cache"
    direction: DOWN
    timeout: 10000
    speed: 40
    optional: true

- assertVisible:
    id: "settings-tile-cache"
    optional: true

- takeScreenshot: "settings-profile-storage-complete"
