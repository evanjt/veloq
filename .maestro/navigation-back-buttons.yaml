# Back Button Navigation Regression
# Tests back navigation doesn't corrupt the navigation stack

appId: com.veloq.app.dev
tags:
  - tier2
---
- runFlow:
    file: helpers/setup-demo-mode.yaml

# Wait for demo data before deep linking to activity
- extendedWaitUntil:
    visible:
      id: "home-activity-list"
    timeout: 15000

# Home -> Activity detail -> back -> verify home
- openLink: "veloq://activity/demo-test-0"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "activity-detail-screen"
    timeout: 15000
- takeScreenshot: "navigation-back-buttons-activity-detail"

# Navigate back via deep-link (Maestro's `back` command is unreliable on iOS)
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
- takeScreenshot: "navigation-back-buttons-back-to-home"

# Settings -> About -> back -> verify settings
- openLink: "veloq://settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000
- openLink: "veloq://about"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "about-screen"
    timeout: 10000
- takeScreenshot: "navigation-back-buttons-about"

- openLink: "veloq://settings"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000
- takeScreenshot: "navigation-back-buttons-back-to-settings"

# Fitness -> back -> verify home
- openLink: "veloq://fitness"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "fitness-screen"
    timeout: 10000
- openLink: "veloq://"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000

- takeScreenshot: "navigation-back-buttons-complete"
