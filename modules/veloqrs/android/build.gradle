// Build Rust library for each requested architecture (local development)
// In CI, the library is pre-built by a separate workflow step.
// Locally, rebuild architectures whose .so is missing OR older than any
// `.rs` source under rust/. Previously the task short-circuited as long as
// the .so existed at all, so a submodule bump silently kept the stale
// binary in the APK — and the user saw "old algorithm" behavior after
// `npx expo run:android` reported success.
task buildRustLibrary {
  def jniLibsDir = file("${projectDir}/src/main/jniLibs")
  def rustDir = file("${projectDir}/../rust/veloqrs")
  def rustRoot = file("${projectDir}/../rust")
  def architectures = reactNativeArchitectures()

  architectures.each { arch ->
    outputs.file(file("${jniLibsDir}/${arch}/libveloqrs.so"))
  }

  doLast {
    // Newest .rs source under rust/ (tracematch + veloqrs). If any of these
    // is newer than a target .so, that arch needs a rebuild.
    long newestSourceMs = 0
    fileTree(dir: rustRoot, include: "**/*.rs", exclude: "**/target/**").each { f ->
      if (f.lastModified() > newestSourceMs) newestSourceMs = f.lastModified()
    }

    def stale = architectures.findAll { arch ->
      def lib = file("${jniLibsDir}/${arch}/libveloqrs.so")
      !lib.exists() || lib.lastModified() < newestSourceMs
    }
    if (stale.isEmpty()) {
      println "[veloqrs] Rust libraries up to date for: ${architectures.join(', ')}"
      return
    }
    println "[veloqrs] Rebuilding Rust library (source newer than .so) for: ${stale.join(', ')}..."
    def args = []
    stale.each { arch -> args.addAll(["-t", arch]) }
    // ProcessBuilder rather than Gradle's exec {}: Gradle 9 (Expo SDK 56)
    // removed Project.exec from the task-action context.
    def cmd = ["cargo", "ndk"] + args + ["--platform", "24",
               "-o", jniLibsDir.absolutePath, "build", "--release", "-p", "veloqrs"]
    def proc = new ProcessBuilder(cmd).directory(rustDir).inheritIO().start()
    def code = proc.waitFor()
    if (code != 0) {
      throw new GradleException("cargo ndk failed with exit code ${code}")
    }
    println "[veloqrs] Rust libraries built for: ${stale.join(', ')}"
  }
}

// Make CMake and JniLibs tasks depend on Rust library
tasks.matching { it.name.startsWith("buildCMake") }.configureEach {
  dependsOn buildRustLibrary
}
tasks.matching { it.name.matches("merge.*JniLibFolders") }.configureEach {
  dependsOn buildRustLibrary
}

// Fix duplicate libveloqrs.so: AGP copies jniLibs into CMake output directory,
// causing conflict with the original in jniLibs. Remove the CMake copy before merging.
// The Rust library should only come from jniLibs (pre-built by cargo-ndk).
tasks.configureEach { task ->
  if (task.name == "mergeReleaseNativeLibs" || task.name == "mergeDebugNativeLibs") {
    task.doFirst {
      // Delete libveloqrs.so from CMake intermediates (keep only jniLibs copy)
      fileTree(dir: "${buildDir}/intermediates/cxx", includes: ["**/libveloqrs.so"]).each { file ->
        println "[veloqrs] Removing duplicate from CMake output: ${file}"
        file.delete()
      }
    }
  }
}
