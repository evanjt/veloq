name: Install Maestro
description: Install the Maestro CLI and expose it on PATH (idempotent)

# Deliberately unpinned: pinning MAESTRO_VERSION broke before when the CDN
# removed the pinned release (404). Latest is the lesser risk here.

runs:
  using: composite
  steps:
    - name: Install Maestro
      shell: bash
      run: |
        if command -v maestro &>/dev/null; then
          echo "Maestro already on PATH: $(command -v maestro)"
        elif [ -f "$HOME/.maestro/bin/maestro" ]; then
          echo "Found script-installed Maestro"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
        else
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
        fi
        # $GITHUB_PATH only affects later steps, so put the freshly installed
        # binary on PATH for the in-step verification below.
        export PATH="$HOME/.maestro/bin:$PATH"
        maestro --version
