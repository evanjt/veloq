version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Expo SDK pins these as a set. Group-bumping them individually breaks the
      # build (react/react-test-renderer must match exactly; react-native bumps
      # break SDK-pinned native libraries). Move them together with
      # `npx expo install --fix` at SDK upgrades instead.
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-test-renderer"
      - dependency-name: "react-native"
      - dependency-name: "@types/react"
      - dependency-name: "react-native-gesture-handler"
      - dependency-name: "react-native-reanimated"
      - dependency-name: "react-native-worklets"
      - dependency-name: "react-native-screens"
      - dependency-name: "react-native-safe-area-context"
      - dependency-name: "@shopify/react-native-skia"

  - package-ecosystem: "npm"
    directory: "/oauth-proxy"
    schedule:
      interval: "weekly"
    groups:
      oauth-proxy-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/modules/veloqrs"
    schedule:
      interval: "weekly"
    groups:
      veloqrs-npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/modules/veloqrs/rust"
    schedule:
      interval: "weekly"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # uniffi metadata format must match the pinned uniffi-bindgen-react-native
      # (1.93.0). A lone crate bump fails Verify Bindings; bump both together
      # with a bindings regen instead.
      - dependency-name: "uniffi"

  - package-ecosystem: "bundler"
    directory: "/config/fastlane"
    schedule:
      interval: "weekly"
    groups:
      bundler-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gha-all:
        patterns: ["*"]
    ignore:
      # Toolchains pinned by hand (rustfmt 1.95.0, bindgen 1.93.0). A dependabot
      # bump points at a nonexistent Rust version and breaks Rust Lint and Verify
      # Bindings; bump these with a matching cargo fmt / bindings regen instead.
      - dependency-name: "dtolnay/rust-toolchain"
