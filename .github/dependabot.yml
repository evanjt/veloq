version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/oauth-proxy"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/modules/veloqrs"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/modules/veloqrs/rust"
    schedule:
      interval: "weekly"

  - package-ecosystem: "bundler"
    directory: "/config/fastlane"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
