version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/oauth-proxy"
    schedule:
      interval: "weekly"
    groups:
      oauth-proxy-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/modules/veloqrs"
    schedule:
      interval: "weekly"
    groups:
      veloqrs-npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/modules/veloqrs/rust"
    schedule:
      interval: "weekly"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "bundler"
    directory: "/config/fastlane"
    schedule:
      interval: "weekly"
    groups:
      bundler-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gha-all:
        patterns: ["*"]
