version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/oauth-proxy"
    schedule:
      interval: "weekly"
    groups:
      oauth-proxy-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/modules/veloqrs"
    schedule:
      interval: "weekly"
    groups:
      veloqrs-npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/modules/veloqrs/rust"
    schedule:
      interval: "weekly"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "bundler"
    directory: "/config/fastlane"
    schedule:
      interval: "weekly"
    groups:
      bundler-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gha-all:
        patterns: ["*"]
    ignore:
      # Toolchains pinned by hand (rustfmt 1.95.0, bindgen 1.93.0). A dependabot
      # bump points at a nonexistent Rust version and breaks Rust Lint and Verify
      # Bindings; bump these with a matching cargo fmt / bindings regen instead.
      - dependency-name: "dtolnay/rust-toolchain"
