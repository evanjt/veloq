name: CI

on:
  push:
    branches: ["**"]
    # Tags handled by release.yml (artifact promotion)
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type override"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - preview
          - production
      run_e2e:
        description: "Run E2E tests"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  checks: write

env:
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Tests (non-blocking — builds run in parallel)
  # ============================================
  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: typescript
            cmd: npx tsc --noEmit
          - name: format
            cmd: npm run format:check
          - name: jest
            cmd: npm test -- --maxWorkers=2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.cmd }}

  test-rust:
    name: Test (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/veloqrs/rust
          key: test

      - name: Run Rust tests
        working-directory: modules/veloqrs/rust
        run: cargo test --workspace

  # ============================================
  # Verify committed bindings match Rust source
  # ============================================
  verify-bindings:
    name: Verify Bindings
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/veloqrs/rust
          key: verify-bindings-1.93

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Install dependencies
        run: npm ci

      - name: Regenerate bindings
        run: ./scripts/generate-bindings.sh

      - name: Check bindings match
        run: |
          if ! git diff --quiet modules/veloqrs/src/generated modules/veloqrs/cpp/generated; then
            echo "::error::Bindings out of sync with Rust source. Run ./scripts/generate-bindings.sh and commit."
            echo ""
            echo "=== Changed files ==="
            git diff --stat modules/veloqrs/src/generated modules/veloqrs/cpp/generated
            echo ""
            echo "=== Detailed diff (first 100 lines) ==="
            git diff modules/veloqrs/src/generated modules/veloqrs/cpp/generated | head -100
            exit 1
          fi
          echo "Bindings are in sync with Rust source"

  # ============================================
  # Build Android
  # ============================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      JAVA_TOOL_OPTIONS: "-Dhttp.agent=Gradle -Dhttps.agent=Gradle"
      GRADLE_OPTS: "-Dhttp.agent=Gradle -Dhttps.agent=Gradle"
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      filename: ${{ steps.version.outputs.filename }}
      is_release: ${{ steps.version.outputs.is_release }}
      is_signed: ${{ steps.signing.outputs.is_signed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          BUILD_TYPE="preview"
          IS_RELEASE="false"

          if [[ "${{ inputs.build_type }}" != "" && "${{ inputs.build_type }}" != "auto" ]]; then
            BUILD_TYPE="${{ inputs.build_type }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            BUILD_TYPE="production"
            IS_RELEASE="true"
          fi

          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT

          if [[ "$BUILD_TYPE" == "production" ]]; then
            echo "filename=veloq-${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "filename=veloq-${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

          # Source hash for build caching (skip on main — always build fresh for signing)
          SOURCE_HASH=$(cat <(find src app modules plugins -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.json" -o -name "*.kt" -o -name "*.java" -o -name "*.gradle" -o -name "*.rs" -o -name "*.toml" \) -exec sha256sum {} \; 2>/dev/null) <(sha256sum package.json app.json 2>/dev/null) | sort | sha256sum | cut -d' ' -f1 | head -c 12)
          echo "source_hash=$SOURCE_HASH" >> $GITHUB_OUTPUT

          echo "Build type: $BUILD_TYPE | Version: $VERSION ($VERSION_CODE) | Hash: $SOURCE_HASH"

      # Source-hash cache — skip build if code unchanged (non-main only)
      - name: Cache built APK
        id: apk-cache
        if: github.ref != 'refs/heads/main' && github.event_name != 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: android/app/build/outputs/apk/release/app-release.apk
          key: android-apk-v1-${{ steps.version.outputs.source_hash }}

      - name: Setup Node.js
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: "npm"

      - name: Setup Java
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper

      - name: Cache Metro bundler
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            /tmp/metro-*
            node_modules/.cache
          key: metro-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            metro-${{ runner.os }}-

      - name: Install dependencies
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup Rust toolchain
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Rust dependencies
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/veloqrs/rust

      - name: Install cargo-ndk
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk

      - name: Build Rust libraries for Android
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: modules/veloqrs/rust
        run: |
          echo "=== Building veloqrs for Android ==="
          mkdir -p ../android/src/main/jniLibs

          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Full build: all 4 architectures for release
            cargo ndk -t aarch64-linux-android -t armv7-linux-androideabi -t x86_64-linux-android -t i686-linux-android \
              --platform 24 -o ../android/src/main/jniLibs \
              build --release -p veloqrs
          else
            # PR/branch build: arm64 + x86_64 only (faster)
            cargo ndk -t aarch64-linux-android -t x86_64-linux-android \
              --platform 24 -o ../android/src/main/jniLibs \
              build --release -p veloqrs
          fi

          echo "=== Verifying .so installation ==="
          find ../android/src/main/jniLibs -name "*.so" -exec ls -lh {} \;

      - name: Write google-services.json
        if: steps.apk-cache.outputs.cache-hit != 'true'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > google-services.json
            echo "Wrote google-services.json from secret ($(stat -c%s google-services.json) bytes)"
          else
            echo "::notice::GOOGLE_SERVICES_JSON not available — writing stub for CI build"
            cat > google-services.json << 'STUBEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "firebase_url": "https://placeholder.firebaseio.com",
              "project_id": "placeholder",
              "storage_bucket": "placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.veloq.app"
                  }
                },
                "api_key": [{"current_key": "placeholder"}]
              }
            ],
            "configuration_version": "1"
          }
          STUBEOF
            echo "Wrote google-services.json stub ($(stat -c%s google-services.json) bytes)"
          fi

      - name: Cache Android prebuild
        if: steps.apk-cache.outputs.cache-hit != 'true'
        id: android-prebuild-cache
        uses: actions/cache@v4
        with:
          path: |
            android
            !android/build
            !android/.gradle
            !android/.cxx
            !android/app/build
            !android/app/.cxx
          key: android-prebuild-v7-${{ runner.os }}-${{ hashFiles('app.json', 'app.config.js', 'package.json', 'package-lock.json', 'plugins/**', 'expo-modules/**/*.json', 'modules/**/android/**', 'modules/**/package.json', 'node_modules/react-native-vector-icons/package.json', 'node_modules/react-native-webview/package.json') }}

      - name: Generate Android native project
        if: steps.apk-cache.outputs.cache-hit != 'true' && steps.android-prebuild-cache.outputs.cache-hit != 'true'
        run: APP_VARIANT=production npx expo prebuild --platform android

      - name: Install Gradle init script
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.gradle
          cp .github/ci-init.gradle ~/.gradle/init.gradle

      - name: Free disk space
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/3[0-3]*
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-[1-2]*
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-3[0-2]
          sudo docker image prune --all --force || true
          df -h

      # Setup signing if secrets are available (Gradle falls back to debug signing otherwise)
      - name: Setup signing
        id: signing
        if: steps.apk-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            mkdir -p android/app
            echo "$ANDROID_KEYSTORE_BASE64" | tr -d ' \n\r\t' | base64 -d > android/app/release.keystore

            printf '%s\n' \
              "storeFile=release.keystore" \
              "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              > android/keystore.properties

            echo "is_signed=true" >> $GITHUB_OUTPUT
            echo "Signing configured (release key)"
          else
            echo "is_signed=false" >> $GITHUB_OUTPUT
            echo "::notice::Android signing secrets not available — APK will use debug signing"
          fi

      - name: Verify veloqrs libraries
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          echo "=== Verifying .so files ==="
          if [ ! -d "modules/veloqrs/android/src/main/jniLibs" ]; then
            echo "ERROR: jniLibs directory not found!"
            exit 1
          fi

          all_ok=true
          for arch in arm64-v8a x86_64; do
            so_file="modules/veloqrs/android/src/main/jniLibs/$arch/libveloqrs.so"
            if [ -f "$so_file" ]; then
              size=$(stat -c%s "$so_file" 2>/dev/null || echo "0")
              if [ "$size" -gt 0 ]; then
                echo "$arch: ${size} bytes"
              else
                echo "ERROR: $arch file is empty!"
                all_ok=false
              fi
            else
              echo "ERROR: $arch not found at $so_file"
              all_ok=false
            fi
          done

          # Check extra architectures on main
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            for arch in armeabi-v7a x86; do
              so_file="modules/veloqrs/android/src/main/jniLibs/$arch/libveloqrs.so"
              if [ -f "$so_file" ]; then
                size=$(stat -c%s "$so_file" 2>/dev/null || echo "0")
                echo "$arch: ${size} bytes"
              else
                echo "WARNING: $arch not found (expected for main builds)"
              fi
            done
          fi

          if [ "$all_ok" = "false" ]; then
            echo "ERROR: veloqrs libraries verification failed!"
            exit 1
          fi

      - name: Clean stale dex archives
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf android/app/build/intermediates/project_dex_archive
          rm -rf android/app/build/intermediates/dex

      - name: Build Android APK
        if: steps.apk-cache.outputs.cache-hit != 'true' && !(github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          cd android && ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,x86_64 \
            --no-daemon --no-build-cache

      - name: Build Android APK + AAB
        if: steps.apk-cache.outputs.cache-hit != 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: cd android && ./gradlew assembleRelease bundleRelease --no-daemon --no-build-cache

      - name: Skip build (cache hit)
        if: steps.apk-cache.outputs.cache-hit == 'true'
        run: echo "Using cached APK (hash ${{ steps.version.outputs.source_hash }})"

      - name: Copy APK
        run: |
          mkdir -p artifacts
          if [ ! -f android/keystore.properties ]; then
            echo "::warning::keystore.properties not found — APK uses debug signing"
          fi
          cp android/app/build/outputs/apk/release/app-release.apk \
            "artifacts/${{ steps.version.outputs.filename }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.version.outputs.filename }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Verify AAB signing
        if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && steps.signing.outputs.is_signed == 'true'
        env:
          EXPECTED_SHA1: "0D:54:88:9C:F2:AF:55:09:8F:40:35:E8:54:66:17:F8:30:FD:0D:86"
        run: |
          echo "=== Verifying AAB was signed with correct key ==="
          AAB_FILE="artifacts/${{ steps.version.outputs.filename }}.aab"

          # Copy AAB to artifacts first
          AAB_SRC=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          if [ -n "$AAB_SRC" ]; then
            cp "$AAB_SRC" "$AAB_FILE"
          else
            echo "::error::AAB file not found"
            exit 1
          fi

          ACTUAL_SHA1=$(unzip -p "$AAB_FILE" "META-INF/BNDLTOOL.RSA" 2>/dev/null | \
            keytool -printcert 2>/dev/null | \
            grep "SHA1:" | head -1 | sed 's/.*SHA1: *//' | tr -d ' ')

          if [ -z "$ACTUAL_SHA1" ]; then
            RSA_FILE=$(unzip -l "$AAB_FILE" 2>/dev/null | grep "META-INF/.*\.RSA" | awk '{print $4}' | head -1)
            if [ -n "$RSA_FILE" ]; then
              ACTUAL_SHA1=$(unzip -p "$AAB_FILE" "$RSA_FILE" 2>/dev/null | \
                keytool -printcert 2>/dev/null | \
                grep "SHA1:" | head -1 | sed 's/.*SHA1: *//' | tr -d ' ')
            fi
          fi

          echo "Expected SHA1: $EXPECTED_SHA1"
          echo "Actual SHA1:   $ACTUAL_SHA1"

          if [ -z "$ACTUAL_SHA1" ]; then
            echo "::error::Could not extract signing certificate from AAB"
            exit 1
          fi

          if [ "$ACTUAL_SHA1" != "$EXPECTED_SHA1" ]; then
            echo "::error::AAB signed with wrong key!"
            exit 1
          fi

          echo "AAB signed with correct release key"

      - name: Upload AAB artifact
        if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && steps.signing.outputs.is_signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.version.outputs.filename }}
          path: artifacts/*.aab
          retention-days: 30

  # ============================================
  # Build iOS
  # ============================================
  build-ios:
    name: Build iOS
    runs-on: macos-26
    timeout-minutes: 90
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      filename: ${{ steps.version.outputs.filename }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          BUILD_TYPE="preview"
          IS_RELEASE="false"

          if [[ "${{ inputs.build_type }}" != "" && "${{ inputs.build_type }}" != "auto" ]]; then
            BUILD_TYPE="${{ inputs.build_type }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            BUILD_TYPE="production"
            IS_RELEASE="true"
          fi

          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT

          if [[ "$BUILD_TYPE" == "production" ]]; then
            echo "filename=veloq-${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "filename=veloq-${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

          # Source hash for simulator .app caching
          SOURCE_HASH=$(cat <(find src app modules plugins -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.json" -o -name "*.swift" -o -name "*.m" -o -name "*.mm" -o -name "*.h" -o -name "*.kt" -o -name "*.java" -o -name "*.podspec" -o -name "*.rs" -o -name "*.toml" \) -exec sha256sum {} \; 2>/dev/null) <(sha256sum package.json app.json 2>/dev/null) | sort | sha256sum | cut -d' ' -f1 | head -c 12)
          echo "source_hash=$SOURCE_HASH" >> $GITHUB_OUTPUT

          echo "Build type: $BUILD_TYPE | Version: $VERSION ($VERSION_CODE) | Hash: $SOURCE_HASH"

      # Source-hash cache for simulator .app
      - name: Cache simulator app
        id: app-cache
        uses: actions/cache@v4
        with:
          path: ios/build/Build/Products/Release-iphonesimulator/Veloq.app
          key: ios-sim-v1-${{ steps.version.outputs.source_hash }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: "npm"

      # ---- Rust Build ----
      - name: Setup Rust toolchain
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust dependencies
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/veloqrs/rust

      - name: Copy C++ files for iOS build
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p modules/veloqrs/ios/cpp/generated
          cp modules/veloqrs/cpp/veloqrs.h modules/veloqrs/ios/cpp/
          cp modules/veloqrs/cpp/veloqrs.cpp modules/veloqrs/ios/cpp/
          cp modules/veloqrs/cpp/generated/veloqrs.hpp modules/veloqrs/ios/cpp/generated/
          cp modules/veloqrs/cpp/generated/veloqrs.cpp modules/veloqrs/ios/cpp/generated/

      - name: Build Rust for iOS
        if: steps.app-cache.outputs.cache-hit != 'true'
        working-directory: modules/veloqrs/rust
        run: |
          echo "=== Building veloqrs for iOS ==="

          # Always build simulator targets
          for target in aarch64-apple-ios-sim x86_64-apple-ios; do
            echo "Building for $target..."
            cargo build --release --target $target -p veloqrs
          done

          # Build device target on main/dispatch (needed for signed IPA)
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Building for aarch64-apple-ios (device)..."
            cargo build --release --target aarch64-apple-ios -p veloqrs
          fi

          # Create fat library for simulator (arm64 + x86_64)
          echo "Creating fat library for simulator..."
          mkdir -p target/sim-fat
          lipo -create \
            target/aarch64-apple-ios-sim/release/libveloqrs.a \
            target/x86_64-apple-ios/release/libveloqrs.a \
            -output target/sim-fat/libveloqrs_ffi.a

          # Create XCFramework
          echo "Creating XCFramework..."
          mkdir -p ../ios/Frameworks
          rm -rf ../ios/Frameworks/VeloqrsFFI.xcframework

          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]] && [ -f target/aarch64-apple-ios/release/libveloqrs.a ]; then
            # Full XCFramework with device + simulator
            cp target/aarch64-apple-ios/release/libveloqrs.a target/aarch64-apple-ios/release/libveloqrs_ffi.a
            xcodebuild -create-xcframework \
              -library target/aarch64-apple-ios/release/libveloqrs_ffi.a \
              -library target/sim-fat/libveloqrs_ffi.a \
              -output ../ios/Frameworks/VeloqrsFFI.xcframework
          else
            # Simulator-only XCFramework
            xcodebuild -create-xcframework \
              -library target/sim-fat/libveloqrs_ffi.a \
              -output ../ios/Frameworks/VeloqrsFFI.xcframework
          fi

          echo "XCFramework created"
          ls -la ../ios/Frameworks/

      # ---- iOS Native Project ----
      - name: Cache iOS prebuild
        if: steps.app-cache.outputs.cache-hit != 'true'
        id: ios-prebuild-cache
        uses: actions/cache@v4
        with:
          path: ios
          key: ios-prebuild-v6-${{ runner.os }}-${{ hashFiles('app.json', 'app.config.js', 'package.json', 'package-lock.json', 'plugins/**', 'expo-modules/**/*.json', 'modules/**/ios/**', 'modules/**/package.json') }}
          restore-keys: |
            ios-prebuild-v6-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate native project
        if: steps.app-cache.outputs.cache-hit != 'true' && steps.ios-prebuild-cache.outputs.cache-hit != 'true'
        run: APP_VARIANT=production npx expo prebuild --platform ios

      - name: Cache CocoaPods
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            cocoapods-${{ runner.os }}-

      - name: Setup Ruby
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: config/fastlane

      - name: Install Pods
        if: steps.app-cache.outputs.cache-hit != 'true'
        working-directory: ios
        run: |
          gem install cocoapods 2>/dev/null || true
          pod install

      # ---- Simulator Build (always) ----
      - name: Initialize simulator
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          xcrun simctl list > /dev/null 2>&1 || true
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            xcodebuild -downloadPlatform iOS || exit 1
          fi

      - name: Find simulator
        if: steps.app-cache.outputs.cache-hit != 'true'
        id: simulator
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available | grep -E "iPhone 17 \(" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          if [ -z "$DEVICE_UDID" ]; then
            DEVICE_UDID=$(xcrun simctl list devices available | grep -E "iPhone" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          fi
          echo "Found simulator UDID: $DEVICE_UDID"
          xcrun simctl boot "$DEVICE_UDID" || true
          echo "udid=$DEVICE_UDID" >> $GITHUB_OUTPUT

      - name: Build simulator app
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          xcodebuild -workspace ios/Veloq.xcworkspace \
            -scheme Veloq \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ios-build.log || {
              tail -100 ios-build.log
              exit 1
            }

      - name: Skip build (cache hit)
        if: steps.app-cache.outputs.cache-hit == 'true'
        run: echo "Using cached simulator app (hash ${{ steps.version.outputs.source_hash }})"

      - name: Verify and package simulator app
        run: |
          APP_PATH="ios/build/Build/Products/Release-iphonesimulator/Veloq.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App not found"
            exit 1
          fi
          if [ ! -f "$APP_PATH/Veloq" ]; then
            echo "ERROR: Missing executable at $APP_PATH/Veloq"
            ls -la "$APP_PATH/"
            exit 1
          fi
          echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
          mkdir -p artifacts
          cd "$(dirname "$APP_PATH")"
          zip -yr "$OLDPWD/artifacts/${{ steps.version.outputs.filename }}-ios-simulator.zip" Veloq.app
          echo "Created ${{ steps.version.outputs.filename }}-ios-simulator.zip"

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-${{ steps.version.outputs.filename }}
          path: artifacts/*-ios-simulator.zip
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios-build.log
          retention-days: 3

      # ---- Signed IPA (main/dispatch with secrets) ----
      - name: Check for iOS signing credentials
        id: check_ios_signing
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          IOS_DISTRIBUTION_CERT_P12: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
        run: |
          if [ -n "$MATCH_GIT_URL" ] && [ -n "$ASC_KEY_ID" ] && [ -n "$IOS_DISTRIBUTION_CERT_P12" ]; then
            echo "has_signing=true" >> $GITHUB_OUTPUT
            echo "iOS signing credentials found"
          else
            echo "has_signing=false" >> $GITHUB_OUTPUT
            echo "::notice::iOS signing not configured — skipping IPA build"
          fi

      - name: Import code signing certificate
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Setup SSH for Match
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Sync provisioning profiles with Match
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
        working-directory: config/fastlane
        run: bundle exec fastlane match appstore --readonly

      - name: Pre-build diagnostics
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          echo "=== Pre-build Diagnostics ==="
          sw_vers
          xcodebuild -version
          df -h /
          curl -sI --connect-timeout 5 https://timestamp.apple.com/ts01 && echo "timestamp.apple.com reachable" || echo "timestamp.apple.com NOT reachable"
          security find-identity -v -p codesigning | head -10
          echo "=== End Diagnostics ==="

      - name: Start build watchdog
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          (
            sleep 60
            while true; do
              echo ""
              echo "========== WATCHDOG: $(date) =========="
              ps aux | grep -E 'xcodebuild|codesign|security' | grep -v grep || echo "No relevant processes"
              pgrep -fl codesign 2>/dev/null || echo "No codesign running"
              uptime
              df -h / | tail -1
              tail -20 config/fastlane/artifacts/Veloq-Veloq.log 2>/dev/null || echo "No log yet"
              echo "========================================"
              sleep 60
            done
          ) &
          echo $! > /tmp/watchdog.pid
          echo "Watchdog started with PID $(cat /tmp/watchdog.pid)"

      - name: Build signed IPA
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        timeout-minutes: 45
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
        working-directory: config/fastlane
        run: |
          echo "=== Starting IPA build at $(date) ==="
          bundle exec fastlane ios build_release
          echo "=== Build completed at $(date) ==="

      - name: Stop watchdog
        if: always() && steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          if [ -f /tmp/watchdog.pid ]; then
            kill $(cat /tmp/watchdog.pid) 2>/dev/null || true
          fi

      - name: Capture diagnostic info on failure
        if: failure() && steps.check_ios_signing.outputs.has_signing == 'true'
        run: |
          mkdir -p config/fastlane/artifacts/diagnostics
          ps aux > config/fastlane/artifacts/diagnostics/processes.txt 2>&1
          pgrep -fl codesign > config/fastlane/artifacts/diagnostics/codesign.txt 2>&1 || echo "No codesign" > config/fastlane/artifacts/diagnostics/codesign.txt
          lsof -i -n -P > config/fastlane/artifacts/diagnostics/network.txt 2>&1 || true
          log show --last 5m --predicate 'process == "codesign" OR process == "xcodebuild"' > config/fastlane/artifacts/diagnostics/system.log 2>&1 || true
          security list-keychains > config/fastlane/artifacts/diagnostics/keychain.txt 2>&1
          security find-identity -v -p codesigning >> config/fastlane/artifacts/diagnostics/keychain.txt 2>&1
          vm_stat > config/fastlane/artifacts/diagnostics/memory.txt 2>&1

      - name: Upload build logs on failure
        if: failure() && steps.check_ios_signing.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ steps.version.outputs.filename }}
          path: |
            config/fastlane/artifacts/*.log
            config/fastlane/artifacts/diagnostics/*
            ~/Library/Logs/gym/*.log
          retention-days: 7

      - name: Rename IPA
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          mkdir -p artifacts
          IPA_PATH=$(find . -name "*.ipa" -type f | head -1)
          if [ -n "$IPA_PATH" ]; then
            cp "$IPA_PATH" "artifacts/${{ steps.version.outputs.filename }}.ipa"
            echo "IPA: ${{ steps.version.outputs.filename }}.ipa"
          fi

      - name: Verify IPA code signature
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        env:
          EXPECTED_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          EXPECTED_BUNDLE_ID: "com.veloq.app"
        run: |
          echo "=== Verifying IPA code signature ==="
          IPA_FILE="artifacts/${{ steps.version.outputs.filename }}.ipa"

          if [ ! -f "$IPA_FILE" ]; then
            echo "::error::IPA file not found at $IPA_FILE"
            exit 1
          fi

          rm -rf /tmp/ipa_verify
          mkdir -p /tmp/ipa_verify
          unzip -q "$IPA_FILE" -d /tmp/ipa_verify

          APP_PATH=$(find /tmp/ipa_verify -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in IPA"
            exit 1
          fi

          codesign -dv --verbose=2 "$APP_PATH" 2>&1 | tee /tmp/codesign.txt || {
            echo "::error::IPA is not properly signed"
            exit 1
          }

          ACTUAL_TEAM=$(grep "TeamIdentifier=" /tmp/codesign.txt | cut -d= -f2)
          echo "Expected Team ID: $EXPECTED_TEAM_ID"
          echo "Actual Team ID:   $ACTUAL_TEAM"

          if [ "$ACTUAL_TEAM" != "$EXPECTED_TEAM_ID" ]; then
            echo "::error::Team ID mismatch!"
            exit 1
          fi

          ACTUAL_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null)
          if [ "$ACTUAL_BUNDLE_ID" != "$EXPECTED_BUNDLE_ID" ]; then
            echo "::error::Bundle ID mismatch!"
            exit 1
          fi

          codesign --verify --deep --strict "$APP_PATH" 2>&1 || {
            echo "::error::Code signature verification failed"
            exit 1
          }

          rm -rf /tmp/ipa_verify
          echo "IPA signed correctly by team $ACTUAL_TEAM with bundle ID $ACTUAL_BUNDLE_ID"

      - name: Upload IPA artifact
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.version.outputs.filename }}
          path: artifacts/*.ipa
          retention-days: 30

  # ============================================
  # Build Dev Variant for E2E (Android)
  # ============================================
  build-android-dev:
    name: Build Android Dev
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      JAVA_TOOL_OPTIONS: "-Dhttp.agent=Gradle -Dhttps.agent=Gradle"
      GRADLE_OPTS: "-Dhttp.agent=Gradle -Dhttps.agent=Gradle"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute source hash
        id: hash
        run: |
          SOURCE_HASH=$(cat <(find src app modules plugins -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.json" -o -name "*.kt" -o -name "*.java" -o -name "*.gradle" -o -name "*.rs" -o -name "*.toml" \) -exec sha256sum {} \; 2>/dev/null) <(sha256sum package.json app.json 2>/dev/null) | sort | sha256sum | cut -d' ' -f1 | head -c 12)
          echo "source_hash=$SOURCE_HASH" >> $GITHUB_OUTPUT

      - name: Cache dev APK
        id: apk-cache
        uses: actions/cache@v4
        with:
          path: android/app/build/outputs/apk/release/app-release.apk
          key: android-dev-apk-v1-${{ steps.hash.outputs.source_hash }}

      - name: Skip build (cache hit)
        if: steps.apk-cache.outputs.cache-hit == 'true'
        run: echo "Using cached dev APK (hash ${{ steps.hash.outputs.source_hash }})"

      - uses: actions/setup-node@v4
        if: steps.apk-cache.outputs.cache-hit != 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - if: steps.apk-cache.outputs.cache-hit != 'true'
        run: npm ci

      - uses: actions/setup-java@v4
        if: steps.apk-cache.outputs.cache-hit != 'true'
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        if: steps.apk-cache.outputs.cache-hit != 'true'

      - uses: gradle/actions/setup-gradle@v4
        if: steps.apk-cache.outputs.cache-hit != 'true'

      - uses: dtolnay/rust-toolchain@stable
        if: steps.apk-cache.outputs.cache-hit != 'true'
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        if: steps.apk-cache.outputs.cache-hit != 'true'
        with:
          workspaces: modules/veloqrs/rust

      - name: Install cargo-ndk
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk

      - name: Build Rust libraries
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: modules/veloqrs/rust
        run: |
          mkdir -p ../android/src/main/jniLibs
          cargo ndk -t aarch64-linux-android -t x86_64-linux-android \
            --platform 24 -o ../android/src/main/jniLibs \
            build --release -p veloqrs

      - name: Write google-services.json stub
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          cat > google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "firebase_url": "https://placeholder.firebaseio.com",
              "project_id": "placeholder",
              "storage_bucket": "placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.veloq.app.dev" }
                },
                "api_key": [{"current_key": "placeholder"}]
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Generate native project (dev variant)
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android

      - name: Build release APK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          cd android && ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,x86_64 \
            --no-daemon --no-build-cache

      - uses: actions/upload-artifact@v4
        with:
          name: android-dev-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

  # ============================================
  # Build Dev Variant for E2E (iOS)
  # ============================================
  build-ios-dev:
    name: Build iOS Dev

    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute source hash
        id: hash
        run: |
          SOURCE_HASH=$(cat <(find src app modules plugins -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.json" -o -name "*.swift" -o -name "*.m" -o -name "*.mm" -o -name "*.h" -o -name "*.podspec" -o -name "*.rs" -o -name "*.toml" \) -exec sha256sum {} \; 2>/dev/null) <(sha256sum package.json app.json 2>/dev/null) | sort | sha256sum | cut -d' ' -f1 | head -c 12)
          echo "source_hash=$SOURCE_HASH" >> $GITHUB_OUTPUT

      - name: Cache dev simulator app
        id: app-cache
        uses: actions/cache@v4
        with:
          path: artifacts/ios-dev-simulator.zip
          key: ios-dev-sim-v1-${{ steps.hash.outputs.source_hash }}

      - name: Skip build (cache hit)
        if: steps.app-cache.outputs.cache-hit == 'true'
        run: echo "Using cached dev simulator app (hash ${{ steps.hash.outputs.source_hash }})"

      - uses: maxim-lobanov/setup-xcode@v1
        if: steps.app-cache.outputs.cache-hit != 'true'
        with:
          xcode-version: '26.2'

      - uses: actions/setup-node@v4
        if: steps.app-cache.outputs.cache-hit != 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - if: steps.app-cache.outputs.cache-hit != 'true'
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        if: steps.app-cache.outputs.cache-hit != 'true'
        with:
          targets: aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        if: steps.app-cache.outputs.cache-hit != 'true'
        with:
          workspaces: modules/veloqrs/rust

      - name: Copy C++ files for iOS build
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p modules/veloqrs/ios/cpp/generated
          cp modules/veloqrs/cpp/veloqrs.h modules/veloqrs/ios/cpp/
          cp modules/veloqrs/cpp/veloqrs.cpp modules/veloqrs/ios/cpp/
          cp modules/veloqrs/cpp/generated/veloqrs.hpp modules/veloqrs/ios/cpp/generated/
          cp modules/veloqrs/cpp/generated/veloqrs.cpp modules/veloqrs/ios/cpp/generated/

      - name: Build Rust for iOS simulator
        if: steps.app-cache.outputs.cache-hit != 'true'
        working-directory: modules/veloqrs/rust
        run: |
          for target in aarch64-apple-ios-sim x86_64-apple-ios; do
            cargo build --release --target $target -p veloqrs
          done
          mkdir -p target/sim-fat
          lipo -create \
            target/aarch64-apple-ios-sim/release/libveloqrs.a \
            target/x86_64-apple-ios/release/libveloqrs.a \
            -output target/sim-fat/libveloqrs_ffi.a
          mkdir -p ../ios/Frameworks
          rm -rf ../ios/Frameworks/VeloqrsFFI.xcframework
          xcodebuild -create-xcframework \
            -library target/sim-fat/libveloqrs_ffi.a \
            -output ../ios/Frameworks/VeloqrsFFI.xcframework

      - name: Generate native project (dev variant)
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform ios

      - name: Install Pods
        if: steps.app-cache.outputs.cache-hit != 'true'
        working-directory: ios
        run: pod install

      - name: Find simulator
        if: steps.app-cache.outputs.cache-hit != 'true'
        id: simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep -E "iPhone 17 Pro" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          fi
          echo "udid=$UDID" >> $GITHUB_OUTPUT

      - name: Build simulator app
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          xcodebuild -workspace ios/VeloqDev.xcworkspace \
            -scheme VeloqDev \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package simulator app
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          APP_PATH="ios/build/Build/Products/Release-iphonesimulator/VeloqDev.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: VeloqDev.app not found"
            ls -la ios/build/Build/Products/Release-iphonesimulator/ || true
            exit 1
          fi
          mkdir -p artifacts
          cd "$(dirname "$APP_PATH")"
          zip -yr "$OLDPWD/artifacts/ios-dev-simulator.zip" VeloqDev.app

      - uses: actions/upload-artifact@v4
        with:
          name: ios-dev-simulator
          path: artifacts/ios-dev-simulator.zip
          retention-days: 7

  # ============================================
  # E2E Tests - Android with Maestro
  # ============================================
  e2e-android:
    needs: build-android-dev

    name: E2E Android (Maestro)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-dev-apk
          path: /tmp/android-artifact

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          "$HOME/.maestro/bin/maestro" --version

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create and boot emulator
        run: |
          sdkmanager "system-images;android-35;google_apis;x86_64" "emulator"
          echo "no" | avdmanager create avd -n test -k "system-images;android-35;google_apis;x86_64" --force

          echo "=== AVD verification ==="
          avdmanager list avd
          ls -la $HOME/.android/avd/ || true

          $ANDROID_HOME/emulator/emulator -avd test -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -read-only &
          EMULATOR_PID=$!
          echo "Emulator PID: $EMULATOR_PID"

          adb wait-for-device
          for i in $(seq 1 60); do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            if [ "$BOOT" = "1" ]; then echo "Boot complete after ${i}s"; break; fi
            echo "Waiting for boot... ($i/60)"
            sleep 2
          done
          sleep 5

          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Install APK and warm up
        run: |
          APK=$(find /tmp/android-artifact -name "*.apk" | head -1)
          adb install "$APK"
          sleep 3
          adb logcat -c

      - name: Determine test tier
        id: tier
        run: echo "tags=tier0,tier1,tier2,tier3" >> $GITHUB_OUTPUT

      - name: Run Maestro tests
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 180000
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro test .maestro/ \
            --include-tags=${{ steps.tier.outputs.tags }} \
            --format junit --output maestro-report.xml --no-ansi || echo "MAESTRO_FAILED=true" >> $GITHUB_ENV

      - name: Capture diagnostic logs
        if: always()
        run: |
          adb logcat -d > /tmp/logcat.txt 2>&1 || true
          grep -E "(FATAL|veloqrs|ReactNative|AndroidRuntime|Process:|Signal|crash|panic)" /tmp/logcat.txt > /tmp/logcat-filtered.txt 2>/dev/null || true

      - name: Collect screenshots
        if: always()
        run: |
          mkdir -p screenshots-flat
          find ~/.maestro -name "*.png" -exec cp {} screenshots-flat/ \; 2>/dev/null || true
          for f in screenshots-flat/*.png; do
            [ -f "$f" ] && mv "$f" "${f%.png}-android.png" 2>/dev/null || true
          done

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-android
          path: screenshots-flat/
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-report
          path: maestro-report.xml
          retention-days: 7

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-logcat
          path: |
            /tmp/logcat.txt
            /tmp/logcat-filtered.txt
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: maestro-report.xml
          check_name: E2E Android Results
          fail_on_failure: false

      - name: Fail if tests failed
        if: always() && env.MAESTRO_FAILED == 'true'
        run: exit 1

  # ============================================
  # E2E Tests - iOS with Maestro
  # ============================================
  e2e-ios:
    needs: build-ios-dev

    name: E2E iOS (Maestro)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Download iOS app
        uses: actions/download-artifact@v4
        with:
          name: ios-dev-simulator
          path: /tmp/ios-artifact

      - name: Extract iOS app
        run: |
          mkdir -p ios/build/Build/Products/Release-iphonesimulator
          ZIP=$(find /tmp/ios-artifact -name "*.zip" | head -1)
          unzip "$ZIP" -d ios/build/Build/Products/Release-iphonesimulator/

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          "$HOME/.maestro/bin/maestro" --version

      - name: Find and boot simulator
        id: simulator
        run: |
          DEVICE="iPhone 17 Pro Max"
          UDID=$(xcrun simctl list devices available | grep "$DEVICE" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          fi
          echo "Using simulator: $UDID"
          xcrun simctl boot "$UDID" || true
          echo "udid=$UDID" >> $GITHUB_OUTPUT

      - name: Wait for simulator readiness
        run: |
          for i in $(seq 1 30); do
            if xcrun simctl spawn "${{ steps.simulator.outputs.udid }}" launchctl list 2>/dev/null | grep -q SpringBoard; then
              echo "SpringBoard is running"
              break
            fi
            echo "Waiting for SpringBoard... ($i/30)"
            sleep 2
          done
          sleep 5

      - name: Install app
        run: |
          xcrun simctl install "${{ steps.simulator.outputs.udid }}" ios/build/Build/Products/Release-iphonesimulator/VeloqDev.app

      - name: Determine test tier
        id: tier
        run: echo "tags=tier0,tier1,tier2,tier3" >> $GITHUB_OUTPUT

      - name: Run Maestro tests
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 180000
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro test .maestro/ \
            --include-tags=${{ steps.tier.outputs.tags }} \
            --format junit --output maestro-report.xml --no-ansi || echo "MAESTRO_FAILED=true" >> $GITHUB_ENV

      - name: Capture diagnostic logs
        if: always()
        run: |
          xcrun simctl spawn "${{ steps.simulator.outputs.udid }}" log show --last 5m --predicate 'process == "VeloqDev" OR processImagePath CONTAINS "VeloqDev"' > /tmp/ios-sim-log.txt 2>&1 || true
          find ~/Library/Logs/DiagnosticReports -name "VeloqDev*" -exec cp {} /tmp/ \; 2>/dev/null || true

      - name: Collect screenshots
        if: always()
        run: |
          mkdir -p screenshots-flat
          find ~/.maestro -name "*.png" -exec cp {} screenshots-flat/ \; 2>/dev/null || true
          for f in screenshots-flat/*.png; do
            [ -f "$f" ] && mv "$f" "${f%.png}-ios.png" 2>/dev/null || true
          done

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-ios
          path: screenshots-flat/
          retention-days: 14

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-sim-logs
          path: |
            /tmp/ios-sim-log.txt
            /tmp/VeloqDev*
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-report
          path: maestro-report.xml
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: maestro-report.xml
          check_name: E2E iOS Results
          fail_on_failure: false

      - name: Fail if tests failed
        if: always() && env.MAESTRO_FAILED == 'true'
        run: exit 1

  # ============================================
  # E2E Summary
  # ============================================
  e2e-summary:
    needs: [e2e-ios, e2e-android]
    if: ${{ always() && (needs.e2e-ios.result != 'skipped' || needs.e2e-android.result != 'skipped') }}
    name: E2E Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download iOS report
        uses: actions/download-artifact@v4
        with:
          name: maestro-ios-report
          path: /tmp/reports/ios
        continue-on-error: true

      - name: Download Android report
        uses: actions/download-artifact@v4
        with:
          name: maestro-android-report
          path: /tmp/reports/android
        continue-on-error: true

      - name: Generate summary
        run: |
          {
            echo "## E2E Test Results"
            echo ""
            echo "| Platform | Result | Status |"
            echo "|----------|--------|--------|"
            for platform in ios android; do
              report="/tmp/reports/$platform/maestro-report.xml"
              if [ -f "$report" ]; then
                tests=$(grep -oP 'tests="\K[0-9]+' "$report" | head -1 || echo "0")
                failures=$(grep -oP 'failures="\K[0-9]+' "$report" | head -1 || echo "0")
                if [ "$failures" = "0" ] || [ -z "$failures" ]; then
                  echo "| $platform | ${tests:-0} passed | :white_check_mark: |"
                else
                  passed=$((tests - failures))
                  echo "| $platform | $passed/$tests passed ($failures failed) | :x: |"
                fi
              else
                echo "| $platform | No report | :warning: |"
              fi
            done
            echo ""
            echo "_See check annotations and artifacts for details_"
          } > summary.md
          cat summary.md >> $GITHUB_STEP_SUMMARY
