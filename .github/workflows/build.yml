name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type override"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - preview
          - production

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  # ============================================
  # Build Android
  # ============================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      JAVA_TOOL_OPTIONS: "-Dhttp.agent=Gradle -Dhttps.agent=Gradle"
      GRADLE_OPTS: "-Dhttp.agent=Gradle -Dhttps.agent=Gradle"
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      filename: ${{ steps.version.outputs.filename }}
      is_release: ${{ steps.version.outputs.is_release }}
      is_signed: ${{ steps.signing.outputs.is_signed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version info
        id: version
        uses: ./.github/actions/compute-version-info
        with:
          build-type-override: ${{ inputs.build_type }}
          source-profile: android

      # Source-hash cache — skip build if code unchanged (non-main only)
      - name: Cache built APK
        id: apk-cache
        if: github.ref != 'refs/heads/main' && github.event_name != 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: android/app/build/outputs/apk/release/app-release.apk
          key: android-apk-v1-${{ steps.version.outputs.source_hash }}

      - name: Setup Node.js
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: "npm"

      - name: Setup Java
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper

      - name: Cache Metro bundler
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            /tmp/metro-*
            node_modules/.cache
          key: metro-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            metro-${{ runner.os }}-

      - name: Install dependencies
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup Rust for Android
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust-android
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Build Rust libraries for Android
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: modules/veloqrs/rust
        run: |
          echo "=== Building veloqrs for Android ==="
          mkdir -p ../android/src/main/jniLibs

          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Full build: all 4 architectures for release
            cargo ndk -t aarch64-linux-android -t armv7-linux-androideabi -t x86_64-linux-android -t i686-linux-android \
              --platform 24 -o ../android/src/main/jniLibs \
              build --release -p veloqrs
          else
            # PR/branch build: arm64 + x86_64 only (faster)
            cargo ndk -t aarch64-linux-android -t x86_64-linux-android \
              --platform 24 -o ../android/src/main/jniLibs \
              build --release -p veloqrs
          fi

          echo "=== Verifying .so installation ==="
          find ../android/src/main/jniLibs -name "*.so" -exec ls -lh {} \;

      - name: Write google-services.json
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/write-google-services-stub
        with:
          secret-contents: ${{ secrets.GOOGLE_SERVICES_JSON }}
          package-name: com.veloq.app

      - name: Cache Android prebuild
        if: steps.apk-cache.outputs.cache-hit != 'true'
        id: android-prebuild-cache
        uses: actions/cache@v4
        with:
          path: |
            android
            !android/build
            !android/.gradle
            !android/.cxx
            !android/app/build
            !android/app/.cxx
          key: android-prebuild-v7-${{ runner.os }}-${{ hashFiles('app.json', 'app.config.js', 'package.json', 'package-lock.json', 'plugins/**', 'expo-modules/**/*.json', 'modules/**/android/**', 'modules/**/package.json', 'node_modules/react-native-vector-icons/package.json', 'node_modules/react-native-webview/package.json') }}

      - name: Generate Android native project
        if: steps.apk-cache.outputs.cache-hit != 'true' && steps.android-prebuild-cache.outputs.cache-hit != 'true'
        run: APP_VARIANT=production npx expo prebuild --platform android

      - name: Install Gradle init script
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.gradle
          cp .github/ci-init.gradle ~/.gradle/init.gradle

      - name: Free disk space
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/3[0-3]*
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-[1-2]*
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-3[0-2]
          sudo docker image prune --all --force || true
          df -h

      # Setup signing if secrets are available (Gradle falls back to debug signing otherwise)
      - name: Setup signing
        id: signing
        if: steps.apk-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            mkdir -p android/app
            echo "$ANDROID_KEYSTORE_BASE64" | tr -d ' \n\r\t' | base64 -d > android/app/release.keystore

            printf '%s\n' \
              "storeFile=release.keystore" \
              "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              > android/keystore.properties

            echo "is_signed=true" >> $GITHUB_OUTPUT
            echo "Signing configured (release key)"
          else
            echo "is_signed=false" >> $GITHUB_OUTPUT
            echo "::notice::Android signing secrets not available — APK will use debug signing"
          fi

      - name: Verify veloqrs libraries
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          echo "=== Verifying .so files ==="
          if [ ! -d "modules/veloqrs/android/src/main/jniLibs" ]; then
            echo "ERROR: jniLibs directory not found!"
            exit 1
          fi

          all_ok=true
          for arch in arm64-v8a x86_64; do
            so_file="modules/veloqrs/android/src/main/jniLibs/$arch/libveloqrs.so"
            if [ -f "$so_file" ]; then
              size=$(stat -c%s "$so_file" 2>/dev/null || echo "0")
              if [ "$size" -gt 0 ]; then
                echo "$arch: ${size} bytes"
              else
                echo "ERROR: $arch file is empty!"
                all_ok=false
              fi
            else
              echo "ERROR: $arch not found at $so_file"
              all_ok=false
            fi
          done

          # Check extra architectures on main
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            for arch in armeabi-v7a x86; do
              so_file="modules/veloqrs/android/src/main/jniLibs/$arch/libveloqrs.so"
              if [ -f "$so_file" ]; then
                size=$(stat -c%s "$so_file" 2>/dev/null || echo "0")
                echo "$arch: ${size} bytes"
              else
                echo "WARNING: $arch not found (expected for main builds)"
              fi
            done
          fi

          if [ "$all_ok" = "false" ]; then
            echo "ERROR: veloqrs libraries verification failed!"
            exit 1
          fi

      - name: Clean stale dex archives
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf android/app/build/intermediates/project_dex_archive
          rm -rf android/app/build/intermediates/dex

      - name: Build Android APK
        if: steps.apk-cache.outputs.cache-hit != 'true' && !(github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          cd android && ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,x86_64 \
            --no-daemon --no-build-cache

      - name: Build Android APK + AAB
        if: steps.apk-cache.outputs.cache-hit != 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: cd android && ./gradlew assembleRelease bundleRelease --no-daemon --no-build-cache

      - name: Skip build (cache hit)
        if: steps.apk-cache.outputs.cache-hit == 'true'
        run: echo "Using cached APK (hash ${{ steps.version.outputs.source_hash }})"

      - name: Copy APK
        run: |
          mkdir -p artifacts
          if [ ! -f android/keystore.properties ]; then
            echo "::warning::keystore.properties not found — APK uses debug signing"
          fi
          cp android/app/build/outputs/apk/release/app-release.apk \
            "artifacts/${{ steps.version.outputs.filename }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.version.outputs.filename }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Verify AAB signing
        if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && steps.signing.outputs.is_signed == 'true'
        env:
          EXPECTED_SHA1: "0D:54:88:9C:F2:AF:55:09:8F:40:35:E8:54:66:17:F8:30:FD:0D:86"
        run: |
          echo "=== Verifying AAB was signed with correct key ==="
          AAB_FILE="artifacts/${{ steps.version.outputs.filename }}.aab"

          # Copy AAB to artifacts first
          AAB_SRC=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          if [ -n "$AAB_SRC" ]; then
            cp "$AAB_SRC" "$AAB_FILE"
          else
            echo "::error::AAB file not found"
            exit 1
          fi

          ACTUAL_SHA1=$(unzip -p "$AAB_FILE" "META-INF/BNDLTOOL.RSA" 2>/dev/null | \
            keytool -printcert 2>/dev/null | \
            grep "SHA1:" | head -1 | sed 's/.*SHA1: *//' | tr -d ' ')

          if [ -z "$ACTUAL_SHA1" ]; then
            RSA_FILE=$(unzip -l "$AAB_FILE" 2>/dev/null | grep "META-INF/.*\.RSA" | awk '{print $4}' | head -1)
            if [ -n "$RSA_FILE" ]; then
              ACTUAL_SHA1=$(unzip -p "$AAB_FILE" "$RSA_FILE" 2>/dev/null | \
                keytool -printcert 2>/dev/null | \
                grep "SHA1:" | head -1 | sed 's/.*SHA1: *//' | tr -d ' ')
            fi
          fi

          echo "Expected SHA1: $EXPECTED_SHA1"
          echo "Actual SHA1:   $ACTUAL_SHA1"

          if [ -z "$ACTUAL_SHA1" ]; then
            echo "::error::Could not extract signing certificate from AAB"
            exit 1
          fi

          if [ "$ACTUAL_SHA1" != "$EXPECTED_SHA1" ]; then
            echo "::error::AAB signed with wrong key!"
            exit 1
          fi

          echo "AAB signed with correct release key"

      - name: Upload AAB artifact
        if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && steps.signing.outputs.is_signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.version.outputs.filename }}
          path: artifacts/*.aab
          retention-days: 30

  # ============================================
  # Build iOS
  # ============================================
  build-ios:
    name: Build iOS
    runs-on: macos-26
    timeout-minutes: 120
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      filename: ${{ steps.version.outputs.filename }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Get version info
        id: version
        uses: ./.github/actions/compute-version-info
        with:
          build-type-override: ${{ inputs.build_type }}
          source-profile: ios

      # Source-hash cache for simulator .app
      - name: Cache simulator app
        id: app-cache
        uses: actions/cache@v4
        with:
          path: ios/build/Build/Products/Release-iphonesimulator/Veloq.app
          key: ios-sim-v1-${{ steps.version.outputs.source_hash }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: "npm"

      # ---- Rust Build ----
      - name: Setup Rust for iOS
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust-ios
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Build Rust for iOS
        if: steps.app-cache.outputs.cache-hit != 'true'
        working-directory: modules/veloqrs/rust
        run: |
          echo "=== Building veloqrs for iOS ==="

          # Always build simulator targets
          for target in aarch64-apple-ios-sim x86_64-apple-ios; do
            echo "Building for $target..."
            cargo build --release --target $target -p veloqrs
          done

          # Build device target on main/dispatch (needed for signed IPA)
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Building for aarch64-apple-ios (device)..."
            cargo build --release --target aarch64-apple-ios -p veloqrs
          fi

          # Create fat library for simulator (arm64 + x86_64)
          echo "Creating fat library for simulator..."
          mkdir -p target/sim-fat
          lipo -create \
            target/aarch64-apple-ios-sim/release/libveloqrs.a \
            target/x86_64-apple-ios/release/libveloqrs.a \
            -output target/sim-fat/libveloqrs_ffi.a

          # Create XCFramework
          echo "Creating XCFramework..."
          mkdir -p ../ios/Frameworks
          rm -rf ../ios/Frameworks/VeloqrsFFI.xcframework

          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]] && [ -f target/aarch64-apple-ios/release/libveloqrs.a ]; then
            # Full XCFramework with device + simulator
            cp target/aarch64-apple-ios/release/libveloqrs.a target/aarch64-apple-ios/release/libveloqrs_ffi.a
            xcodebuild -create-xcframework \
              -library target/aarch64-apple-ios/release/libveloqrs_ffi.a \
              -library target/sim-fat/libveloqrs_ffi.a \
              -output ../ios/Frameworks/VeloqrsFFI.xcframework
          else
            # Simulator-only XCFramework
            xcodebuild -create-xcframework \
              -library target/sim-fat/libveloqrs_ffi.a \
              -output ../ios/Frameworks/VeloqrsFFI.xcframework
          fi

          echo "XCFramework created"
          ls -la ../ios/Frameworks/

      # ---- iOS Native Project ----
      - name: Cache iOS prebuild
        if: steps.app-cache.outputs.cache-hit != 'true'
        id: ios-prebuild-cache
        uses: actions/cache@v4
        with:
          path: ios
          key: ios-prebuild-v6-${{ runner.os }}-${{ hashFiles('app.json', 'app.config.js', 'package.json', 'package-lock.json', 'plugins/**', 'expo-modules/**/*.json', 'modules/**/ios/**', 'modules/**/package.json') }}
          restore-keys: |
            ios-prebuild-v6-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate native project
        if: steps.app-cache.outputs.cache-hit != 'true' && steps.ios-prebuild-cache.outputs.cache-hit != 'true'
        run: APP_VARIANT=production npx expo prebuild --platform ios

      - name: Cache CocoaPods
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            cocoapods-${{ runner.os }}-

      - name: Setup Ruby
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: config/fastlane

      - name: Install Pods
        if: steps.app-cache.outputs.cache-hit != 'true'
        working-directory: ios
        run: |
          gem install cocoapods 2>/dev/null || true
          pod install

      # ---- Simulator Build (always) ----
      - name: Initialize simulator
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          xcrun simctl list > /dev/null 2>&1 || true
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            xcodebuild -downloadPlatform iOS || exit 1
          fi

      - name: Find simulator
        if: steps.app-cache.outputs.cache-hit != 'true'
        id: simulator
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available | grep -E "iPhone 17 \(" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          if [ -z "$DEVICE_UDID" ]; then
            DEVICE_UDID=$(xcrun simctl list devices available | grep -E "iPhone" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          fi
          echo "Found simulator UDID: $DEVICE_UDID"
          xcrun simctl boot "$DEVICE_UDID" || true
          echo "udid=$DEVICE_UDID" >> $GITHUB_OUTPUT

      - name: Build simulator app
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          xcodebuild -workspace ios/Veloq.xcworkspace \
            -scheme Veloq \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ios-build.log || {
              tail -100 ios-build.log
              exit 1
            }

      - name: Skip build (cache hit)
        if: steps.app-cache.outputs.cache-hit == 'true'
        run: echo "Using cached simulator app (hash ${{ steps.version.outputs.source_hash }})"

      - name: Verify and package simulator app
        run: |
          APP_PATH="ios/build/Build/Products/Release-iphonesimulator/Veloq.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App not found"
            exit 1
          fi
          if [ ! -f "$APP_PATH/Veloq" ]; then
            echo "ERROR: Missing executable at $APP_PATH/Veloq"
            ls -la "$APP_PATH/"
            exit 1
          fi
          echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
          mkdir -p artifacts
          cd "$(dirname "$APP_PATH")"
          zip -yr "$OLDPWD/artifacts/${{ steps.version.outputs.filename }}-ios-simulator.zip" Veloq.app
          echo "Created ${{ steps.version.outputs.filename }}-ios-simulator.zip"

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-${{ steps.version.outputs.filename }}
          path: artifacts/*-ios-simulator.zip
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios-build.log
          retention-days: 3

      # ---- Signed IPA (main/dispatch with secrets) ----
      - name: Check for iOS signing credentials
        id: check_ios_signing
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          IOS_DISTRIBUTION_CERT_P12: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
        run: |
          if [ -n "$MATCH_GIT_URL" ] && [ -n "$ASC_KEY_ID" ] && [ -n "$IOS_DISTRIBUTION_CERT_P12" ]; then
            echo "has_signing=true" >> $GITHUB_OUTPUT
            echo "iOS signing credentials found"
          else
            echo "has_signing=false" >> $GITHUB_OUTPUT
            echo "::notice::iOS signing not configured — skipping IPA build"
          fi

      - name: Import code signing certificate
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Setup SSH for Match
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Sync provisioning profiles with Match
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
        working-directory: config/fastlane
        run: bundle exec fastlane match appstore --readonly

      - name: Pre-build diagnostics
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          echo "=== Pre-build Diagnostics ==="
          sw_vers
          xcodebuild -version
          df -h /
          curl -sI --connect-timeout 5 https://timestamp.apple.com/ts01 && echo "timestamp.apple.com reachable" || echo "timestamp.apple.com NOT reachable"
          security find-identity -v -p codesigning | head -10
          echo "=== End Diagnostics ==="

      - name: Start build watchdog
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          (
            sleep 60
            while true; do
              echo ""
              echo "========== WATCHDOG: $(date) =========="
              ps aux | grep -E 'xcodebuild|codesign|security' | grep -v grep || echo "No relevant processes"
              pgrep -fl codesign 2>/dev/null || echo "No codesign running"
              uptime
              df -h / | tail -1
              tail -20 config/fastlane/artifacts/Veloq-Veloq.log 2>/dev/null || echo "No log yet"
              echo "========================================"
              sleep 60
            done
          ) &
          echo $! > /tmp/watchdog.pid
          echo "Watchdog started with PID $(cat /tmp/watchdog.pid)"

      - name: Build signed IPA
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        timeout-minutes: 45
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
        working-directory: config/fastlane
        run: |
          echo "=== Starting IPA build at $(date) ==="
          bundle exec fastlane ios build_release
          echo "=== Build completed at $(date) ==="

      - name: Stop watchdog
        if: always() && steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          if [ -f /tmp/watchdog.pid ]; then
            kill $(cat /tmp/watchdog.pid) 2>/dev/null || true
          fi

      - name: Capture diagnostic info on failure
        if: failure() && steps.check_ios_signing.outputs.has_signing == 'true'
        run: |
          mkdir -p config/fastlane/artifacts/diagnostics
          ps aux > config/fastlane/artifacts/diagnostics/processes.txt 2>&1
          pgrep -fl codesign > config/fastlane/artifacts/diagnostics/codesign.txt 2>&1 || echo "No codesign" > config/fastlane/artifacts/diagnostics/codesign.txt
          lsof -i -n -P > config/fastlane/artifacts/diagnostics/network.txt 2>&1 || true
          log show --last 5m --predicate 'process == "codesign" OR process == "xcodebuild"' > config/fastlane/artifacts/diagnostics/system.log 2>&1 || true
          security list-keychains > config/fastlane/artifacts/diagnostics/keychain.txt 2>&1
          security find-identity -v -p codesigning >> config/fastlane/artifacts/diagnostics/keychain.txt 2>&1
          vm_stat > config/fastlane/artifacts/diagnostics/memory.txt 2>&1

      - name: Upload build logs on failure
        if: failure() && steps.check_ios_signing.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ steps.version.outputs.filename }}
          path: |
            config/fastlane/artifacts/*.log
            config/fastlane/artifacts/diagnostics/*
            ~/Library/Logs/gym/*.log
          retention-days: 7

      - name: Rename IPA
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          mkdir -p artifacts
          IPA_PATH=$(find . -name "*.ipa" -type f | head -1)
          if [ -n "$IPA_PATH" ]; then
            cp "$IPA_PATH" "artifacts/${{ steps.version.outputs.filename }}.ipa"
            echo "IPA: ${{ steps.version.outputs.filename }}.ipa"
          fi

      - name: Verify IPA code signature
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        env:
          EXPECTED_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          EXPECTED_BUNDLE_ID: "com.veloq.app"
        run: |
          echo "=== Verifying IPA code signature ==="
          IPA_FILE="artifacts/${{ steps.version.outputs.filename }}.ipa"

          if [ ! -f "$IPA_FILE" ]; then
            echo "::error::IPA file not found at $IPA_FILE"
            exit 1
          fi

          rm -rf /tmp/ipa_verify
          mkdir -p /tmp/ipa_verify
          unzip -q "$IPA_FILE" -d /tmp/ipa_verify

          APP_PATH=$(find /tmp/ipa_verify -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in IPA"
            exit 1
          fi

          codesign -dv --verbose=2 "$APP_PATH" 2>&1 | tee /tmp/codesign.txt || {
            echo "::error::IPA is not properly signed"
            exit 1
          }

          ACTUAL_TEAM=$(grep "TeamIdentifier=" /tmp/codesign.txt | cut -d= -f2)
          echo "Expected Team ID: $EXPECTED_TEAM_ID"
          echo "Actual Team ID:   $ACTUAL_TEAM"

          if [ "$ACTUAL_TEAM" != "$EXPECTED_TEAM_ID" ]; then
            echo "::error::Team ID mismatch!"
            exit 1
          fi

          ACTUAL_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null)
          if [ "$ACTUAL_BUNDLE_ID" != "$EXPECTED_BUNDLE_ID" ]; then
            echo "::error::Bundle ID mismatch!"
            exit 1
          fi

          codesign --verify --deep --strict "$APP_PATH" 2>&1 || {
            echo "::error::Code signature verification failed"
            exit 1
          }

          rm -rf /tmp/ipa_verify
          echo "IPA signed correctly by team $ACTUAL_TEAM with bundle ID $ACTUAL_BUNDLE_ID"

      - name: Upload IPA artifact
        if: steps.check_ios_signing.outputs.has_signing == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.version.outputs.filename }}
          path: artifacts/*.ipa
          retention-days: 30

