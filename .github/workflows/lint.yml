name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  format:
    name: Format
    runs-on: git-runner-set
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  typecheck:
    name: TypeScript
    runs-on: git-runner-set
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
