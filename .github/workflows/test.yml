name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  jest:
    name: Jest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --maxWorkers=2
        env:
          # Prevent jest-expo from loading expo/virtual/streams polyfill.
          # The polyfill replaces native ReadableStream and its cancel()
          # triggers unhandled rejections during axios module initialization.
          EXPO_OS: web

  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/veloqrs/rust
          key: test

      - name: Run Rust tests
        working-directory: modules/veloqrs/rust
        run: cargo test --workspace

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pinned to the toolchain the tree is formatted with; bump this together
      # with a fresh `cargo fmt` run when the local toolchain moves.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/veloqrs/rust
          key: lint

      # Scoped to the in-repo crate; the tracematch submodule formats on its
      # own release cycle and joins this gate once its tree is fmt-clean.
      - name: Check formatting
        working-directory: modules/veloqrs/rust
        run: cargo fmt -p veloqrs --check

      # Informational for now: surfaces warnings without blocking. Flip to
      # `-D warnings` once the existing warning surface is cleared.
      - name: Clippy (informational)
        continue-on-error: true
        working-directory: modules/veloqrs/rust
        run: cargo clippy --workspace

  verify-bindings:
    name: Verify Bindings
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/veloqrs/rust
          key: verify-bindings-1.93

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Install dependencies
        run: npm ci

      - name: Regenerate bindings
        run: ./scripts/generate-bindings.sh

      - name: Check bindings match
        run: |
          if ! git diff --quiet modules/veloqrs/src/generated modules/veloqrs/cpp/generated; then
            echo "::error::Bindings out of sync with Rust source. Run ./scripts/generate-bindings.sh and commit."
            echo ""
            echo "=== Changed files ==="
            git diff --stat modules/veloqrs/src/generated modules/veloqrs/cpp/generated
            echo ""
            echo "=== Detailed diff (first 100 lines) ==="
            git diff modules/veloqrs/src/generated modules/veloqrs/cpp/generated | head -100
            exit 1
          fi
          echo "Bindings are in sync with Rust source"
